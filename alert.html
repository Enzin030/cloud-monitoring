<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>兒托監管雲 - 異常告警追蹤</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
</head>
<body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
        <div class="space-y-12">
            <!-- 標題與麵包屑 左右對齊 (與系統管理樣式同步) -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-10">
                <div class="space-y-1">
                    <h2 class="text-5xl font-black text-slate-800 font-headline tracking-tighter">異常告警追蹤</h2>
                    <p class="text-slate-400 font-bold text-sm">主動偵測事件之流水線與處理追蹤</p>
                </div>
                <div class="flex items-center text-xs text-slate-400 font-bold space-x-2 bg-slate-50 px-6 py-2.5 rounded-full border border-slate-100">
                    <span class="material-symbols-outlined text-[14px]">home</span>
                    <span>首頁</span>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="text-slate-900 font-black tracking-tight">異常告警追蹤</span>
                </div>
            </div>

            <!-- Filter Panel -->
            <section class="lux-card p-10 flex flex-col md:flex-row items-end justify-between gap-8">
                <div class="flex-1 grid grid-cols-1 md:grid-cols-4 gap-8 w-full">
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">時間區段</label>
                        <input class="w-full bg-slate-50 border-none rounded-2xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100" type="text" value="2023.10.12 - 10.19"/>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">兒托場所</label>
                        <select class="w-full bg-slate-50 border-none rounded-2xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100">
                            <option>全區場所</option>
                            <option>北屯中心</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">事件類別</label>
                        <select class="w-full bg-slate-50 border-none rounded-xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100">
                            <option>所有類型</option>
                            <option>鏡頭遮蔽</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">處理進度</label>
                        <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                            <button class="flex-1 py-2 rounded-xl text-[11px] font-black bg-white text-slate-900 shadow-sm border border-black/5">待處理</button>
                            <button class="flex-1 py-2 rounded-xl text-[11px] font-bold text-slate-500">待審核</button>
                            <button class="flex-1 py-2 rounded-xl text-[11px] font-bold text-slate-500">已結案</button>
                        </div>
                    </div>
                </div>
                
                <button class="px-10 py-4 bg-slate-900 text-white rounded-[1.5rem] text-sm font-black shadow-lux hover:bg-slate-800 transition-all flex items-center shrink-0">
                    <span class="material-symbols-outlined mr-3">file_download</span>
                    匯出清單
                </button>
            </section>

            <!-- Table Content -->
            <section class="lux-card overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100">
                            <th class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest">時間與設備序號</th>
                            <th class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest">區域場所</th>
                            <th class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest">偵測類型</th>
                            <th class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest">緊急程度</th>
                            <th class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">核定執行</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <tr class="hover:bg-slate-50/50 transition-all group">
                            <td class="px-10 py-8">
                                <p class="text-[10px] font-black text-accent uppercase tracking-widest mb-1 leading-none">ID: CAM-00213</p>
                                <p class="text-sm font-black text-slate-900 tracking-tight">2023.10.19 14:22</p>
                            </td>
                            <td class="px-10 py-8">
                                <p class="text-sm font-bold text-slate-900">北屯中心</p>
                                <p class="text-[11px] text-slate-400 font-medium">大班教室區域</p>
                            </td>
                            <td class="px-10 py-8">
                                <span class="px-4 py-1.5 bg-red-50 text-red-600 text-[10px] font-black rounded-full border border-red-100">鏡頭遮蔽 (待回報)</span>
                            </td>
                            <td class="px-10 py-8">
                                <span class="flex items-center text-red-600 text-[11px] font-black">
                                    <div class="w-2 h-2 rounded-full bg-red-600 mr-3 shadow-sm shadow-red-200"></div>
                                    緊急
                                </span>
                            </td>
                            <td class="px-10 py-8 text-right">
                                <button class="px-6 py-2.5 bg-slate-900 text-white text-[11px] font-black rounded-xl hover:bg-slate-800 shadow-lg shadow-slate-200">通知場所回報</button>
                            </td>
                        </tr>
                        <tr class="hover:bg-slate-50/50 transition-all group">
                            <td class="px-10 py-8">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">ID: CAM-00455</p>
                                <p class="text-sm font-black text-slate-900 tracking-tight">2023.10.19 12:05</p>
                            </td>
                            <td class="px-10 py-8">
                                <p class="text-sm font-bold text-slate-900">太平中心</p>
                                <p class="text-[11px] text-slate-400 font-medium">備餐區入口</p>
                            </td>
                            <td class="px-10 py-8">
                                <span class="px-4 py-1.5 bg-slate-100 text-slate-600 text-[10px] font-black rounded-full border border-slate-200">訊號中斷 (待報修)</span>
                            </td>
                            <td class="px-10 py-8">
                                <span class="flex items-center text-slate-400 text-[11px] font-black">
                                    <div class="w-2 h-2 rounded-full bg-slate-300 mr-3"></div>
                                    一般
                                </span>
                            </td>
                            <td class="px-10 py-8 text-right">
                                <button class="px-6 py-2.5 border-2 border-slate-900 text-slate-900 text-[11px] font-black rounded-xl hover:bg-slate-900 hover:text-white transition-all">通知廠商報修</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>

        <div id="footer-placeholder" class="mt-20"></div>
    </main>
</body>
</html>

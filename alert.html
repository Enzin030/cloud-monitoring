<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>告警歷史與稽核 | </title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="lib/config.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c3c6d1; border-radius: 10px; }
    </style>
    <script src="lib/layout.js"></script>
</head>
<body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Scrollable content area (Full width) -->
    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
            <!-- Breadcrumbs / Page Title -->
            <div class="space-y-1">
                <div class="flex items-center text-xs text-slate-500 font-medium space-x-2">
                    <span class="material-symbols-outlined text-[12px]">home</span>
                    <span>首頁</span>
                    <span class="material-symbols-outlined text-[12px]">chevron_right</span>
                    <span>異常告警追蹤</span>
                </div>
                <h2 class="text-3xl font-black text-primary font-headline tracking-tight">異常告警追蹤</h2>
            </div>

            <div class="flex flex-col gap-6">
                <!-- Action Header -->
                <section class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div class="flex space-x-3">
                        <button class="flex items-center px-4 py-2 bg-white border border-outline-variant/30 rounded-lg text-sm font-bold text-primary hover:bg-slate-50 transition-all shadow-sm">
                            <span class="material-symbols-outlined mr-2 text-sm">file_download</span>
                            匯出 PDF
                        </button>
                        <button class="flex items-center px-4 py-2 bg-primary text-white rounded-lg text-sm font-bold shadow-lg hover:opacity-90 active:scale-95 transition-all">
                            <span class="material-symbols-outlined mr-2 text-sm">sync</span>
                            生成稽核報告
                        </button>
                    </div>
                </section>

                <!-- Filter Panel -->
                <section class="bg-white p-6 rounded-xl border border-outline-variant/10 shadow-sm space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">日期範圍</label>
                            <input class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-sm font-medium text-primary focus:ring-2 focus:ring-primary/20" type="text" value="2023.10.12 - 10.19"/>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">中心名稱</label>
                            <select class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-sm font-medium text-primary">
                                <option>所有中心</option>
                                <option>晨星托育中心</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">告警類型</label>
                            <select class="w-full bg-surface-container-low border-none rounded-lg py-2.5 px-4 text-sm font-medium text-primary">
                                <option>所有違規</option>
                                <option>鏡頭遮蔽</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-tighter">狀態</label>
                            <div class="flex bg-surface-container-low p-1 rounded-lg">
                                <button class="flex-1 py-1.5 rounded-md text-xs font-bold bg-white text-primary shadow-sm">待處理</button>
                                <button class="flex-1 py-1.5 rounded-md text-xs font-medium text-slate-500">已審核</button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Table Content -->
                <section class="bg-white rounded-xl border border-outline-variant/10 shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-outline-variant/10">
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">時間</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">位置</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">類型</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">嚴重度</th>
                                <th class="px-6 py-4 text-[10px] font-black text-slate-410 uppercase tracking-widest text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            <tr class="hover:bg-slate-50/50 transition-colors">
                                <td class="px-6 py-4">
                                    <p class="text-xs font-bold text-primary">2023.10.19</p>
                                    <p class="text-[10px] text-slate-400">14:22:08</p>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center space-x-2">
                                        <span class="material-symbols-outlined text-sm text-slate-400">apartment</span>
                                        <span class="text-xs font-bold text-primary">晨星托育中心 (CAM-04)</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 rounded-md bg-error/10 text-error text-[10px] font-black">鏡頭遮蔽</span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center space-x-1">
                                        <div class="w-1.5 h-1.5 rounded-full bg-error"></div>
                                        <span class="text-xs font-bold text-error">緊急</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-colors"><span class="material-symbols-outlined">more_vert</span></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>

            <!-- Footer Placeholder -->
            <div id="footer-placeholder"></div>
        </main>
    </div>
</body>
</html>

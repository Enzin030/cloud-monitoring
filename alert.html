<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 異常告警追蹤</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body
    class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden"
  >
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
      <div class="space-y-12">
        <!-- 標題與麵包屑並排佈局 -->
        <div class="border-b border-slate-100 pb-8 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">
              異常告警追蹤
            </h2>
            <div
              class="flex items-center text-sm text-slate-400 font-bold space-x-2 mb-1.5"
            >
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]"
                >chevron_right</span
              >
              <span class="text-slate-800 font-black tracking-tight"
                >異常告警追蹤</span
              >
            </div>
          </div>
        </div>

        <!-- Filter Panel -->
        <section
          class="lux-card p-10 flex flex-col md:flex-row items-end justify-between gap-8"
        >
          <div class="flex-1 grid grid-cols-1 md:grid-cols-4 gap-8 w-full">
            <div class="space-y-3">
              <label
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1"
                >時間區段</label
              >
              <input
                class="w-full bg-slate-50 border-none rounded-2xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100"
                type="text"
                value="2024.04.17 - 04.24"
              />
            </div>
            <div class="space-y-3">
              <label
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1"
                >兒托場所</label
              >
              <select
                class="w-full bg-slate-50 border-none rounded-2xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100"
              >
                <option>選擇 行政區 - 場所...</option>
                <option>北屯區 - 北屯中心</option>
                <option>太平區 - 太平中心</option>
              </select>
            </div>
            <div class="space-y-3">
              <label
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1"
                >事件類別</label
              >
              <select
                class="w-full bg-slate-50 border-none rounded-xl py-3.5 px-6 text-sm font-black text-slate-900 focus:ring-2 focus:ring-slate-100"
              >
                <option>所有類型</option>
                <option>鏡頭遮蔽</option>
              </select>
            </div>
            <div class="space-y-3">
              <label
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1"
                >處理進度</label
              >
              <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                <button
                  class="flex-1 py-2 rounded-xl text-[11px] font-black bg-white text-slate-900 shadow-sm border border-black/5"
                >
                  待處理
                </button>
                <button
                  class="flex-1 py-2 rounded-xl text-[11px] font-bold text-slate-500"
                >
                  待審核
                </button>
                <button
                  class="flex-1 py-2 rounded-xl text-[11px] font-bold text-slate-500"
                >
                  已結案
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-4 shrink-0">
            <button
              class="px-8 py-4 bg-slate-900 text-white rounded-[1.5rem] text-sm font-black shadow-lux hover:bg-slate-800 transition-all flex items-center justify-center space-x-2"
            >
              <span class="material-symbols-outlined text-[18px]">search</span>
              <span>查詢</span>
            </button>
            <button
              class="px-8 py-4 bg-white border border-slate-200 text-slate-900 rounded-[1.5rem] text-sm font-black shadow-sm hover:bg-slate-50 transition-all flex items-center"
            >
              <span class="material-symbols-outlined mr-3">file_download</span>
              匯出清單
            </button>
          </div>
        </section>

        <!-- Table Content -->
        <section class="lux-card overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50/50 border-b border-slate-100">
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  告警時間
                </th>
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  設備序號
                </th>
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  區域場所
                </th>
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  偵測類型
                </th>
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  處理狀態
                </th>
                <th
                  class="px-10 py-7 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right"
                >
                  功能
                </th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <tr class="hover:bg-slate-50/50 transition-all group">
                <td class="px-10 py-8">
                  <p class="text-sm font-black text-slate-900 tracking-tight">
                    2024.04.17 14:22
                  </p>
                </td>
                <td class="px-10 py-8">
                  <p class="text-[11px] font-black text-accent uppercase tracking-widest leading-none">
                    ID: CAM-00213
                  </p>
                </td>
                <td class="px-10 py-8">
                  <p class="text-sm font-bold text-slate-900">北屯中心</p>
                  <p class="text-[11px] text-slate-400 font-medium">
                    大班教室區域
                  </p>
                </td>
                <td class="px-10 py-8">
                  <span class="px-3 py-1 bg-red-50 text-red-600 text-[10px] font-black rounded-full border border-red-100">
                    鏡頭遮蔽
                  </span>
                </td>
                <td class="px-10 py-8">
                  <span class="text-xs font-bold text-slate-500">
                    待場所回報
                  </span>
                </td>
                <td class="px-10 py-8 text-right">
                  <button class="px-6 py-2.5 bg-white border border-slate-200 text-slate-700 text-[11px] font-black rounded-xl hover:bg-slate-50 shadow-sm transition-all">
                    通知場所回報
                  </button>
                </td>
              </tr>
              <tr class="hover:bg-slate-50/50 transition-all group">
                <td class="px-10 py-8">
                  <p class="text-sm font-black text-slate-900 tracking-tight">
                    2024.04.17 12:05
                  </p>
                </td>
                <td class="px-10 py-8">
                  <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest leading-none">
                    ID: CAM-00455
                  </p>
                </td>
                <td class="px-10 py-8">
                  <p class="text-sm font-bold text-slate-900">太平中心</p>
                  <p class="text-[11px] text-slate-400 font-medium">
                    備餐區入口
                  </p>
                </td>
                <td class="px-10 py-8">
                  <span class="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-black rounded-full border border-slate-200">
                    訊號中斷
                  </span>
                </td>
                <td class="px-10 py-8">
                  <span class="text-xs font-bold text-slate-500">
                    待廠商報修
                  </span>
                </td>
                <td class="px-10 py-8 text-right">
                  <button class="px-6 py-2.5 bg-white border border-slate-200 text-slate-700 text-[11px] font-black rounded-xl hover:bg-slate-50 shadow-sm transition-all">
                    通知廠商報修
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>

      <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

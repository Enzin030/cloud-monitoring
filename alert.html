<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 異常告警追蹤</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
    <style>
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(8px);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background: white;
        padding: 40px;
        border-radius: 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        width: 100%;
        max-width: 480px;
      }
    </style>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
      <div class="space-y-12">
        <!-- 標題與麵包屑 -->
        <div class="border-b border-slate-100 pb-8 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">
              異常告警追蹤
            </h2>
            <div class="flex items-center text-sm text-slate-400 font-bold space-x-2 mb-1.5">
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]">chevron_right</span>
              <span class="text-slate-800 font-bold tracking-tight">異常告警追蹤</span>
            </div>
          </div>
        </div>

        <!-- 篩選區域：左右並排佈局 -->
        <div class="flex flex-col xl:flex-row items-end gap-8 bg-slate-50 p-10 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
          <div class="flex-1 grid grid-cols-1 md:grid-cols-4 gap-8 w-full relative z-10">
            <div class="space-y-3">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">時間區段</label>
              <input class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-6 text-sm font-bold text-slate-900 focus:ring-2 focus:ring-accent/20 transition-all" type="text" value="2024.04.17 - 04.24" />
            </div>
            
            <!-- 下拉選單左右並排 -->
            <div class="md:col-span-2 grid grid-cols-2 gap-4">
              <div class="space-y-3">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">行政區</label>
                <select class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-6 text-sm font-bold text-slate-900 focus:ring-2 focus:ring-accent/20 transition-all">
                  <option selected>北屯區</option>
                  <option>太平區</option>
                  <option>南區</option>
                </select>
              </div>
              <div class="space-y-3">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">場所名稱</label>
                <select class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-6 text-sm font-bold text-slate-900 focus:ring-2 focus:ring-accent/20 transition-all">
                  <option selected>北屯中心</option>
                  <option>太平中心</option>
                  <option>南區中心</option>
                </select>
              </div>
            </div>

            <div class="space-y-3">
              <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">事件類別</label>
              <select class="w-full bg-white border border-slate-200 rounded-2xl py-3 px-6 text-sm font-bold text-slate-900 focus:ring-2 focus:ring-accent/20 transition-all">
                <option>所有類型</option>
                <option>鏡頭遮蔽</option>
                <option>訊號中斷</option>
              </select>
            </div>
          </div>

          <div class="flex items-center gap-4 shrink-0 relative z-10">
            <button class="h-12 px-8 bg-slate-900 text-white rounded-xl text-sm font-bold shadow-lg hover:bg-slate-800 transition-all flex items-center justify-center space-x-2 active:scale-95">
              <span class="material-symbols-outlined text-[18px]">search</span>
              <span>查詢</span>
            </button>
            <button class="h-12 px-8 bg-white border border-slate-200 text-slate-900 rounded-xl text-sm font-bold shadow-sm hover:bg-slate-50 transition-all flex items-center active:scale-95">
              <span class="material-symbols-outlined mr-2">file_download</span>
              匯出
            </button>
          </div>
        </div>

        <!-- 列表區域 -->
        <div class="lux-card overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-50/50 border-b border-slate-100">
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">行政區</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">區域場所</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">告警時間</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">設備序號</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">偵測類型</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">處理狀態</th>
                <th class="px-8 py-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">功能</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <tr class="hover:bg-slate-50/50 transition-all group">
                <td class="px-8 py-7"><p class="text-sm font-bold text-slate-600">北屯區</p></td>
                <td class="px-8 py-7">
                  <p class="text-sm font-bold text-slate-900">北屯中心</p>
                  <p class="text-[11px] text-slate-400 font-medium">大班教室區域</p>
                </td>
                <td class="px-8 py-7"><p class="text-sm font-bold text-slate-900 tabular-nums">2024.04.17 14:22</p></td>
                <td class="px-8 py-7"><p class="text-[11px] font-bold text-accent tracking-widest uppercase">ID: CAM-00213</p></td>
                <td class="px-8 py-7">
                  <span class="px-3 py-1 bg-red-50 text-red-600 text-[10px] font-bold rounded-full border border-red-100">鏡頭遮蔽</span>
                </td>
                <td class="px-8 py-7">
                  <span class="flex items-center text-xs font-bold text-amber-600">
                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500 mr-2 animate-pulse"></span>
                    待處理
                  </span>
                </td>
                <td class="px-8 py-7 text-right">
                  <button onclick="openProcessModal()" class="px-6 py-2 bg-[#1F2937] text-white text-[11px] font-bold rounded-xl hover:bg-slate-800 shadow-md transition-all active:scale-95">
                    處理
                  </button>
                </td>
              </tr>
              <!-- (更多資料行...) -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- 處理動作 Modal 模擬 -->
      <div id="processModal" class="modal-backdrop" onclick="closeProcessModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-bold text-slate-900">執行告警處理動作</h3>
                <button onclick="closeProcessModal()" class="text-slate-400 hover:text-slate-900">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <div class="space-y-6">
                <!-- 選項內容 -->
                <div class="space-y-4">
                    <label class="flex items-center p-6 bg-slate-50 border-2 border-transparent rounded-[1.5rem] cursor-pointer hover:bg-slate-100 transition-all has-[:checked]:border-accent has-[:checked]:bg-blue-50 group">
                        <input type="radio" name="action" class="w-5 h-5 text-accent focus:ring-offset-0 focus:ring-0 mr-4 border-slate-300" checked />
                        <div class="flex-1">
                            <p class="text-sm font-bold text-slate-900 group-has-[:checked]:text-accent">通知廠商報修</p>
                            <p class="text-xs text-slate-500 mt-1">適用於設備訊號中斷、鏡頭故障等硬體問題</p>
                        </div>
                    </label>

                    <label class="flex items-center p-6 bg-slate-50 border-2 border-transparent rounded-[1.5rem] cursor-pointer hover:bg-slate-100 transition-all has-[:checked]:border-accent has-[:checked]:bg-blue-50 group">
                        <input type="radio" name="action" class="w-5 h-5 text-accent focus:ring-offset-0 focus:ring-0 mr-4 border-slate-300" />
                        <div class="flex-1">
                            <p class="text-sm font-bold text-slate-900 group-has-[:checked]:text-accent">通知場所回報情況</p>
                            <p class="text-xs text-slate-500 mt-1">適用於鏡頭被遮蔽、光線異常等現場人為問題</p>
                        </div>
                    </label>
                </div>

                <div class="pt-4 space-y-3">
                    <button onclick="closeProcessModal()" class="w-full py-4 bg-[#1F2937] text-white rounded-2xl font-bold shadow-xl hover:bg-slate-800 transition-all active:scale-95">
                        確認執行通報
                    </button>
                    <button onclick="closeProcessModal()" class="w-full py-4 bg-white text-slate-500 rounded-2xl font-bold hover:text-slate-900 transition-all">
                        取消退出
                    </button>
                </div>
            </div>
        </div>
      </div>

      <script>
        function openProcessModal() {
            document.getElementById('processModal').style.display = 'flex';
        }
        function closeProcessModal() {
            document.getElementById('processModal').style.display = 'none';
        }
      </script>

      <!-- Footer Placeholder -->
      <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

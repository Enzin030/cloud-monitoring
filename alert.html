<!doctype html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
  <title>兒托監管雲 - 異常告警追蹤</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="lib/config.js"></script>
  <script src="lib/layout.js"></script>
</head>
<body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
  <div id="header-placeholder"></div>

  <main class="flex-1 overflow-y-auto p-10 w-full custom-scrollbar">
    <div class="space-y-8">

      <!-- 標題 + 麵包屑 -->
      <div class="border-b border-slate-100 pb-6">
        <div class="flex items-end gap-4">
          <h2 class="text-2xl font-bold text-slate-900 tracking-tight">異常告警追蹤</h2>
          <div class="flex items-center text-sm text-slate-400 space-x-1.5 mb-0.5">
            <span class="material-symbols-outlined text-base">home</span>
            <span>首頁</span>
            <span class="material-symbols-outlined text-base">chevron_right</span>
            <span class="text-slate-700 font-semibold">異常告警追蹤</span>
          </div>
        </div>
      </div>

      <!-- Filter Panel：RWD 自排 -->
      <section class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6">
        <div class="flex flex-wrap items-end gap-5">

          <!-- 起訖日期 -->
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">起訖日期</label>
            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 gap-3">
              <span class="material-symbols-outlined text-blue-500 text-base">calendar_month</span>
              <input type="date" id="f-date-start" class="bg-transparent border-none p-0 text-sm font-semibold text-slate-800 focus:ring-0 w-[130px]"/>
              <span class="text-slate-300 text-sm font-medium">至</span>
              <input type="date" id="f-date-end" class="bg-transparent border-none p-0 text-sm font-semibold text-slate-800 focus:ring-0 w-[130px]"/>
            </div>
          </div>

          <!-- 場所名稱（兩下拉左右） -->
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">場所名稱</label>
            <div class="flex items-center gap-3">
              <select class="bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-sm font-semibold text-slate-800 focus:ring-2 focus:ring-slate-200 min-w-[130px]">
                <option>選擇行政區</option>
                <option>北屯區</option>
                <option>太平區</option>
                <option>西屯區</option>
              </select>
              <select class="bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-sm font-semibold text-slate-800 focus:ring-2 focus:ring-slate-200 min-w-[130px]">
                <option>選擇場所</option>
                <option>北屯中心</option>
                <option>太平中心</option>
              </select>
            </div>
          </div>

          <!-- 事件類別 -->
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">事件類別</label>
            <select class="bg-slate-50 border border-slate-200 rounded-lg py-2.5 px-4 text-sm font-semibold text-slate-800 focus:ring-2 focus:ring-slate-200 min-w-[130px]">
              <option>所有類型</option>
              <option>鏡頭遮蔽</option>
              <option>訊號中斷</option>
            </select>
          </div>

          <!-- 處理進度 -->
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">處理進度</label>
            <div class="flex flex-wrap gap-1.5">
              <button onclick="setProgress(this)" data-p="待處理"
                class="prog-btn px-4 py-2 rounded-lg text-sm font-bold bg-[#1F2937] text-white">待處理</button>
              <button onclick="setProgress(this)" data-p="待廠商維修"
                class="prog-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">待廠商維修</button>
              <button onclick="setProgress(this)" data-p="待場所回報"
                class="prog-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">待場所回報</button>
              <button onclick="setProgress(this)" data-p="待審核"
                class="prog-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">待審核</button>
              <button onclick="setProgress(this)" data-p="已結案"
                class="prog-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200">已結案</button>
            </div>
          </div>

          <!-- 按鈕 -->
          <div class="flex items-center gap-3 ml-auto">
            <button class="px-5 py-2.5 bg-[#1F2937] text-white rounded-lg text-sm font-bold hover:bg-[#374151] transition-all flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">search</span>查詢
            </button>
            <button class="px-5 py-2.5 bg-white border border-slate-200 text-slate-800 rounded-lg text-sm font-bold hover:bg-slate-50 transition-all flex items-center gap-1.5">
              <span class="material-symbols-outlined text-base">file_download</span>匯出清單
            </button>
          </div>
        </div>
      </section>

      <!-- 資料表 -->
      <section class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-50 border-b border-slate-100">
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">告警時間</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">設備序號</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">行政區</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">場所名稱</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">偵測類型</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest">處理狀態</th>
              <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-widest text-right">功能</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            <tr class="hover:bg-slate-50 transition-all">
              <td class="px-6 py-5 text-sm font-semibold text-slate-900">2024.04.17 14:22</td>
              <td class="px-6 py-5">
                <span class="text-sm font-bold text-slate-500">CAM-00213</span>
              </td>
              <td class="px-6 py-5 text-sm font-semibold text-slate-700">北屯區</td>
              <td class="px-6 py-5">
                <p class="text-sm font-bold text-slate-900">北屯中心</p>
                <p class="text-xs text-slate-400 mt-0.5">大班教室區域</p>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-lg">鏡頭遮蔽</span>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-lg">待處理</span>
              </td>
              <td class="px-6 py-5 text-right">
                <button onclick="openProcessModal('CAM-00213','北屯中心','鏡頭遮蔽')"
                  class="px-5 py-2 bg-[#1F2937] text-white text-sm font-bold rounded-lg hover:bg-[#374151] transition-all">
                  處理
                </button>
              </td>
            </tr>
            <tr class="hover:bg-slate-50 transition-all">
              <td class="px-6 py-5 text-sm font-semibold text-slate-900">2024.04.17 12:05</td>
              <td class="px-6 py-5">
                <span class="text-sm font-bold text-slate-500">CAM-00455</span>
              </td>
              <td class="px-6 py-5 text-sm font-semibold text-slate-700">太平區</td>
              <td class="px-6 py-5">
                <p class="text-sm font-bold text-slate-900">太平中心</p>
                <p class="text-xs text-slate-400 mt-0.5">備餐區入口</p>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-slate-100 text-slate-700 text-xs font-bold rounded-lg">訊號中斷</span>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-lg">待處理</span>
              </td>
              <td class="px-6 py-5 text-right">
                <button onclick="openProcessModal('CAM-00455','太平中心','訊號中斷')"
                  class="px-5 py-2 bg-[#1F2937] text-white text-sm font-bold rounded-lg hover:bg-[#374151] transition-all">
                  處理
                </button>
              </td>
            </tr>
            <tr class="hover:bg-slate-50 transition-all">
              <td class="px-6 py-5 text-sm font-semibold text-slate-900">2024.04.17 10:18</td>
              <td class="px-6 py-5">
                <span class="text-sm font-bold text-slate-500">CAM-00302</span>
              </td>
              <td class="px-6 py-5 text-sm font-semibold text-slate-700">西屯區</td>
              <td class="px-6 py-5">
                <p class="text-sm font-bold text-slate-900">西屯中心</p>
                <p class="text-xs text-slate-400 mt-0.5">大型活動場</p>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-lg">鏡頭遮蔽</span>
              </td>
              <td class="px-6 py-5">
                <span class="inline-flex items-center px-3 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-lg">待處理</span>
              </td>
              <td class="px-6 py-5 text-right">
                <button onclick="openProcessModal('CAM-00302','西屯中心','鏡頭遮蔽')"
                  class="px-5 py-2 bg-[#1F2937] text-white text-sm font-bold rounded-lg hover:bg-[#374151] transition-all">
                  處理
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </section>

    </div>
    <div id="footer-placeholder" class="mt-16"></div>
  </main>

  <!-- 處理 Modal -->
  <div id="process-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-[440px] overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-base font-bold text-slate-900">異常事件處理</h3>
        <button onclick="closeProcessModal()" class="w-7 h-7 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-slate-200 transition-all">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="px-6 py-5 space-y-5">
        <!-- 設備資訊（橫列形式） -->
        <div class="bg-slate-50 rounded-xl p-4 space-y-2.5">
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">設備序號</span>
            <span class="text-sm font-bold text-slate-900" id="modal-device-id"></span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">場所名稱</span>
            <span class="text-sm font-semibold text-slate-700" id="modal-location"></span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">事件類別</span>
            <span class="text-sm font-semibold text-slate-700" id="modal-type"></span>
          </div>
        </div>

        <!-- 單選框 -->
        <div class="space-y-3">
          <p class="text-sm font-bold text-slate-900">選擇處理方式</p>
          <label class="flex items-start p-4 rounded-xl border-2 border-slate-100 hover:border-[#1F2937] cursor-pointer transition-all has-[:checked]:border-[#1F2937] has-[:checked]:bg-slate-50">
            <input type="radio" name="process-action" value="notify-venue" class="mt-0.5 w-4 h-4 text-[#1F2937] border-slate-300 focus:ring-[#1F2937]" checked/>
            <div class="ml-3">
              <p class="text-sm font-bold text-slate-900">通知場所回報</p>
              <p class="text-xs text-slate-400 mt-0.5">發送通知給兒托場所，要求回報異常原因與現況</p>
            </div>
          </label>
          <label class="flex items-start p-4 rounded-xl border-2 border-slate-100 hover:border-[#1F2937] cursor-pointer transition-all has-[:checked]:border-[#1F2937] has-[:checked]:bg-slate-50">
            <input type="radio" name="process-action" value="notify-vendor" class="mt-0.5 w-4 h-4 text-[#1F2937] border-slate-300 focus:ring-[#1F2937]"/>
            <div class="ml-3">
              <p class="text-sm font-bold text-slate-900">通知廠商維修</p>
              <p class="text-xs text-slate-400 mt-0.5">產生設備報修單並通知維護廠商現場維修</p>
            </div>
          </label>
        </div>

        <!-- 備註 -->
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">備註說明</label>
          <textarea class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-slate-200 resize-none h-16" placeholder="選填，補充說明異常狀況..."></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
        <button onclick="closeProcessModal()" class="px-5 py-2 bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50 transition-all">取消</button>
        <button onclick="submitProcess()" class="px-5 py-2 bg-[#1F2937] text-white text-sm font-bold rounded-lg hover:bg-[#374151] transition-all">確認送出</button>
      </div>
    </div>
  </div>

  <script>
    // 處理進度 tab 切換
    function setProgress(btn) {
      document.querySelectorAll('.prog-btn').forEach(b => {
        b.className = 'prog-btn px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200';
      });
      btn.className = 'prog-btn px-4 py-2 rounded-lg text-sm font-bold bg-[#1F2937] text-white';
    }

    // 今日日期
    function setToday() {
      const d = new Date();
      d.setDate(d.getDate());
      const fmt = d.toISOString().split('T')[0];
      document.getElementById('f-date-start').value = fmt;
      document.getElementById('f-date-end').value = fmt;
    }
    document.addEventListener('DOMContentLoaded', setToday);

    function openProcessModal(deviceId, location, type) {
      document.getElementById('modal-device-id').textContent = deviceId;
      document.getElementById('modal-location').textContent = location;
      document.getElementById('modal-type').textContent = type;
      document.getElementById('process-modal').classList.remove('hidden');
    }
    function closeProcessModal() {
      document.getElementById('process-modal').classList.add('hidden');
    }
    function submitProcess() {
      const action = document.querySelector('input[name="process-action"]:checked').value;
      const text = action === 'notify-venue' ? '通知場所回報' : '通知廠商維修';
      alert('已送出處理：' + text);
      closeProcessModal();
    }
  </script>
</body>
</html>

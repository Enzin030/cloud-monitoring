<header class="bg-white sticky top-0 z-50 w-full border-b border-outline-variant/10 flex justify-between items-center px-6 py-2 shadow-sm">
    <div class="flex items-center space-x-4">
        <img src="assets/images/logo.png" alt="Logo" class="w-14 h-14 object-contain">
        <div class="flex flex-col">
            <h1 class="text-lg font-bold text-primary font-headline tracking-tighter leading-tight">臺中市社會局</h1>
            <p class="text-base font-semibold text-slate-400 font-headline leading-tight">兒托監管雲</p>
        </div>
    </div>
    
    <div class="flex items-center space-x-4">
        <!-- 狀態標籤 -->
        <div class="hidden md:flex items-center px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full border border-emerald-100/50">
            <span class="relative flex h-2 w-2 mr-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <span class="text-[11px] font-bold">系統運作中</span>
        </div>

        <div class="w-px h-6 bg-slate-200 mx-2"></div>

        <!-- 管理員資訊 -->
        <div class="flex items-center space-x-2 px-3 py-1.5 bg-primary/5 text-primary rounded-lg border border-primary/10">
            <span class="material-symbols-outlined text-[18px]">account_circle</span>
            <span class="text-xs font-bold text-primary">管理員</span>
        </div>
        
        <!-- 登出按鈕 -->
        <button class="flex items-center space-x-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-error hover:text-white transition-all active:scale-95 group">
            <span class="material-symbols-outlined text-sm">logout</span>
            <span>登出</span>
        </button>
    </div>
</header>

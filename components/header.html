<header class="bg-white sticky top-0 z-50 w-full px-10 py-0 flex justify-between items-center shadow-sm border-b border-slate-100 min-h-[80px]">

      </a>
      <a href="live.html" class="nav-link relative flex items-center space-x-2 px-5 py-7 text-sm font-bold text-slate-400 hover:text-slate-900 group transition-colors" data-page="live">
        <span class="material-symbols-outlined text-[20px]">videocam</span>
        <span>監控控制台</span>
        <span class="nav-indicator absolute left-[20%] right-[20%] bottom-[12px] h-[3px] bg-accent rounded-full scale-x-0 group-hover:scale-x-100 transition-transform origin-center"></span>

      <a href="alert.html" class="nav-link relative flex items-center space-x-2 px-5 py-7 text-sm font-bold text-slate-400 hover:text-slate-900 group transition-colors" data-page="alert">

      </a>
      <a href="account.html" class="nav-link relative flex items-center space-x-2 px-5 py-7 text-sm font-bold text-slate-400 hover:text-slate-900 group transition-colors" data-page="account">

      <div class="flex flex-col items-end mr-3">
        <span class="text-xs font-black text-slate-900 flex items-center">
            <span class="material-symbols-outlined text-[16px] mr-1 text-slate-400">account_circle</span>
            林小元

        <span class="text-[10px] font-bold text-slate-500 tracking-widest mt-0.5">系統管理員</span>

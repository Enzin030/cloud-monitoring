<header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 w-full px-10 py-4 flex justify-between items-center border-b border-surface-container/50 shadow-sm">
    <div class="flex items-center space-x-12">
        <!-- Logo Area -->
        <div class="flex items-center space-x-3">
            <div class="p-1.5 bg-primary/5 rounded-xl">
                <img src="assets/images/logo.png" alt="Logo" class="w-10 h-10 object-contain">
            </div>
            <div class="flex flex-col">
                <h1 class="text-xl font-extrabold text-primary tracking-tight font-headline">臺中市社會局</h1>
                <p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest opacity-60">兒托監管雲</p>
            </div>
        </div>

        <!-- Top Nav (參照 Lumina Care) -->
        <nav class="hidden lg:flex items-center space-x-8">
            <a href="index.html" class="text-sm font-bold text-primary border-b-2 border-primary pb-1">控制台</a>
            <a href="live.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">即時監控</a>
            <a href="alert.html" class="text-sm font-bold text-on-surface-variant hover:text-primary transition-colors">異常追蹤</a>
        </nav>
    </div>
    
    <div class="flex items-center space-x-6">
        <!-- Search (非必要，但增加美感) -->
        <div class="relative hidden xl:block">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
            <input type="text" placeholder="搜尋中心或設備..." class="bg-surface-container border-none rounded-full py-2.5 pl-10 pr-6 text-xs font-medium w-64 focus:ring-2 focus:ring-primary/20 transition-all">
        </div>

        <!-- Admin Area -->
        <div class="flex items-center space-x-4">
            <button class="relative p-2 text-on-surface-variant hover:bg-surface-container rounded-full transition-all">
                <span class="material-symbols-outlined">notifications</span>
                <span class="absolute top-2 right-2 w-2 h-2 bg-primary rounded-full border-2 border-white"></span>
            </button>
            <div class="flex items-center space-x-3 bg-surface-container px-3 py-1.5 rounded-full border border-black/5">
                <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-[16px]">person</span>
                </div>
                <span class="text-xs font-bold text-on-surface">管理員</span>
            </div>
            <button class="px-5 py-2.5 bg-on-surface text-white rounded-full text-xs font-bold hover:bg-primary transition-all shadow-md shadow-on-surface/5">登出</button>
        </div>
    </div>
</header>

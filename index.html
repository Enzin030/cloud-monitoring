<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 儀表板</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL,GRAD,opsz@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
          font-family: 'Material Symbols Outlined' !important;
          display: inline-block;
          vertical-align: middle;
          line-height: 1;
      }
    </style>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-surface font-body text-on-surface flex flex-col overflow-hidden h-screen w-screen">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Scrollable content area -->
        <main class="flex-1 overflow-y-auto p-10 w-full space-y-10 bg-surface-container-low custom-scrollbar">
            <!-- Breadcrumbs / Page Title -->
            <div class="space-y-1">
                <div class="flex items-center text-xs text-slate-400 font-medium space-x-2">
                    <span>社會局首頁</span>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="text-primary font-bold">控制台儀表板</span>
                </div>
                <h2 class="text-3xl font-black text-primary font-headline tracking-tight">儀表板總覽</h2>
            </div>

            <div class="grid grid-cols-12 gap-6">
                <!-- Left: Monitoring Grid -->
                <div class="col-span-12 lg:col-span-9 space-y-6">
                    <!-- Statistics Cards -->
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl border border-outline-variant/10 shadow-sm flex items-center space-x-4 transition-transform hover:scale-[1.02]">
                            <div class="w-12 h-12 rounded-lg bg-primary/5 flex items-center justify-center text-primary">
                                <span class="material-symbols-outlined">hub</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">立案中心</p>
                                <p class="text-xl font-bold text-primary">24 間</p>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-error/20 shadow-sm flex items-center space-x-4 border-l-4 border-l-error">
                            <div class="w-12 h-12 rounded-lg bg-error/5 flex items-center justify-center text-error">
                                <span class="material-symbols-outlined">warning</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">即時告警</p>
                                <p class="text-xl font-bold text-error">3 件</p>
                            </div>
                        </div>
                        <div class="bg-white p-6 rounded-xl border border-outline-variant/10 shadow-sm flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-lg bg-emerald-50 flex items-center justify-center text-emerald-600">
                                <span class="material-symbols-outlined">videocam</span>
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">設備狀態</p>
                                <p class="text-xl font-bold text-emerald-600">98.5% 在線</p>
                            </div>
                        </div>
                    </div>

                    <!-- Toolbar -->
                    <div class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-outline-variant/10">
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center space-x-2 bg-surface-container-low px-3 py-1.5 rounded-lg border border-outline-variant/10">
                                <span class="material-symbols-outlined text-sm text-primary">apartment</span>
                                <select class="bg-transparent border-none text-sm font-bold p-0 focus:ring-0 text-primary">
                                    <option>台中市全區中心總覽</option>
                                    <option>北區託育中心聯盟</option>
                                </select>
                            </div>
                        </div>
                        <button class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-xs font-bold text-slate-600 transition-colors">
                            匯出今日日誌
                        </button>
                    </div>

                    <!-- Video Grid -->
                    <div class="grid grid-cols-2 gap-6">
                        <div class="relative group bg-black rounded-xl overflow-hidden shadow-lg border border-outline-variant/10 aspect-video">
                            <img class="w-full h-full object-cover opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX8O2MzXTVCuW9sGLxn9iRA6mqnNVKmxgV7OkU1ADbqvkWC3pnswugr39k_06jvDJ94ok6Kx-nAyyNckSsuvCHqtRphrF2YjZxbtew2e1y-dEQLwn6XyDQEJVxsDo1XnKIVAFPBMiLYjVlHz-XUfsSPUe8JF6pyzMspQEvUpA3qpnVDDmiktVINNXIgUqzRlFXGGKD97JVDL0i--Zac_jaqn1Zfo2QeywFaSjEUHIwf2SNshXeXI8_lZW6g5KH0XhnsF1VxVe5AJxJ"/>
                            <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px] font-bold flex items-center space-x-2">
                                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                                <span>CAM-01 晨星教室</span>
                            </div>
                        </div>
                        <div class="relative group bg-error/10 rounded-xl overflow-hidden shadow-lg border-2 border-error aspect-video">
                            <div class="absolute inset-0 bg-error/20 flex flex-col items-center justify-center z-10 text-center p-4">
                                <span class="material-symbols-outlined text-5xl text-error mb-2 animate-pulse">visibility_off</span>
                                <p class="text-error font-black text-lg">鏡頭遭遮蔽</p>
                                <p class="text-error/80 text-xs font-bold">CAM-02 走廊區域</p>
                            </div>
                            <img class="w-full h-full object-cover grayscale opacity-40 blur-sm" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2oEDNUMyuNkLutZa59a1IXvVjyMFqpYeAja69ppFL1GW4yDXxP2zo0xRsFGw93AnNwx1JEYGE60eaKwShaiaJucIK87rabz5IddKsurmqiKTyS7K33EQAUvw5uWv_C7zzPRrPEUtI_oQvnS6hCNUMORCr-kX-UelNO-4jgSPSbT-ZFybDeokcfGGZVq9_Zwt9x_OAxlpvBYtCiwQZUGdOHbbmyv2wGWvZiNh3RL28uCaQEXVtLiT-9AvdcA45ssYSbjuG6-VJKuL7"/>
                        </div>
                    </div>
                </div>

                <!-- Right: Activity Logs -->
                <aside class="col-span-12 lg:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm border border-outline-variant/10 flex flex-col h-full overflow-hidden">
                        <div class="p-5 border-b border-slate-50">
                            <h3 class="font-bold text-sm text-primary flex items-center">
                                <span class="material-symbols-outlined mr-2 text-lg">history</span>
                                即時告警日誌
                            </h3>
                        </div>
                        <div class="p-5 space-y-6 flex-1 overflow-y-auto custom-scrollbar">
                            <div class="space-y-4">
                                <div class="flex gap-3">
                                    <div class="min-w-[4px] bg-error rounded-full"></div>
                                    <div>
                                        <p class="text-[10px] font-bold text-error mb-0.5">14:52 • 異常中止</p>
                                        <p class="text-xs font-semibold text-slate-700">CAM-04 連線失敗</p>
                                        <p class="text-[10px] text-slate-400">晨星分校</p>
                                    </div>
                                </div>
                                <div class="flex gap-3">
                                    <div class="min-w-[4px] bg-emerald-500 rounded-full"></div>
                                    <div>
                                        <p class="text-[10px] font-bold text-emerald-500 mb-0.5">14:48 • 系統資訊</p>
                                        <p class="text-xs font-semibold text-slate-700">案號 #882 處理完畢</p>
                                        <p class="text-[10px] text-slate-400">處理人：何管理員</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 bg-slate-50">
                            <button class="w-full py-2.5 text-xs font-bold text-slate-500 border border-slate-200 rounded-lg hover:bg-white transition-colors">查看完整紀錄</button>
                        </div>
                    </div>
                </aside>
            </div>
            
            <!-- Footer Placeholder -->
            <div id="footer-placeholder"></div>
        </main>
    </div>
  </body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>- 即時監控與 AI 告警</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="lib/config.js"></script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .video-aspect {
        aspect-ratio: 16 / 9;
      }
      .glass-overlay {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(8px);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c3c6d1;
        border-radius: 10px;
      }
    </style>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-surface font-body text-on-surface flex flex-col overflow-hidden h-screen w-screen">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Scrollable content area -->
        <main class="flex-1 overflow-y-auto p-8 w-full space-y-8 bg-surface-container-low custom-scrollbar">
            <!-- Breadcrumbs / Page Title -->
            <div class="space-y-1">
          <div
            class="flex items-center text-xs text-slate-500 font-medium space-x-2"
          >
            <span class="material-symbols-outlined text-[12px]">home</span>
            <span>首頁</span>
            <span class="material-symbols-outlined text-[12px]"
              >chevron_right</span
            >
            <span class="text-primary font-bold">儀表板</span>
          </div>
          <h2
            class="text-3xl font-black text-primary font-headline tracking-tight"
          >
            儀表板
          </h2>
        </div>

        <div class="flex gap-6 flex-1">
          <!-- Left: Grid View -->
          <div class="flex-1 space-y-6">
            <!-- Toolbar -->
            <div
              class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-outline-variant/10"
            >
              <div class="flex items-center space-x-4">
                <div
                  class="flex items-center space-x-2 bg-surface-container-low px-3 py-1.5 rounded-lg border border-outline-variant/20"
                >
                  <span class="material-symbols-outlined text-sm text-primary"
                    >apartment</span
                  >
                  <select
                    class="bg-transparent border-none text-sm font-semibold p-0 focus:ring-0 text-primary"
                  >
                    <option>晨星托育中心 - 北部分校</option>
                    <option>小巨人幼兒園</option>
                    <option>海風早教中心</option>
                  </select>
                </div>
                <div
                  class="flex bg-surface-container-low rounded-lg p-1 border border-outline-variant/10"
                >
                  <button
                    class="px-3 py-1 bg-white shadow-sm rounded-md text-xs font-bold text-primary"
                  >
                    2x2
                  </button>
                  <button
                    class="px-3 py-1 rounded-md text-xs font-semibold text-slate-500"
                  >
                    3x3
                  </button>
                </div>
              </div>
              <div class="flex items-center space-x-3">
                <button
                  class="flex items-center space-x-2 px-3 py-1.5 hover:bg-slate-50 rounded-lg text-sm text-slate-600 border border-outline-variant/10"
                >
                  <span class="material-symbols-outlined text-lg"
                    >filter_list</span
                  >
                  <span>篩選</span>
                </button>
              </div>
            </div>
            <!-- Video Bento Grid -->
            <div class="grid grid-cols-2 gap-4">
              <div
                class="relative group bg-primary rounded-xl overflow-hidden shadow-lg border-2 border-transparent"
              >
                <img
                  class="w-full video-aspect object-cover"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX8O2MzXTVCuW9sGLxn9iRA6mqnNVKmxgV7OkU1ADbqvkWC3pnswugr39k_06jvDJ94ok6Kx-nAyyNckSsuvCHqtRphrF2YjZxbtew2e1y-dEQLwn6XyDQEJVxsDo1XnKIVAFPBMiLYjVlHz-XUfsSPUe8JF6pyzMspQEvUpA3qpnVDDmiktVINNXIgUqzRlFXGGKD97JVDL0i--Zac_jaqn1Zfo2QeywFaSjEUHIwf2SNshXeXI8_lZW6g5KH0XhnsF1VxVe5AJxJ"
                />
                <div
                  class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"
                ></div>
                <div
                  class="absolute top-4 left-4 glass-overlay px-3 py-1 rounded-full text-primary font-bold text-[10px]"
                >
                  CAM-01: 遊戲室 A
                </div>
              </div>
              <div
                class="relative group bg-error/20 rounded-xl overflow-hidden shadow-lg border-4 border-error ring-4 ring-error/20"
              >
                <div
                  class="absolute inset-0 bg-error/40 flex flex-col items-center justify-center z-10"
                >
                  <span
                    class="material-symbols-outlined text-6xl text-white animate-pulse"
                    >visibility_off</span
                  >
                  <p class="text-white font-black text-xl font-headline">
                    鏡頭遭遮蔽
                  </p>
                </div>
                <img
                  class="w-full video-aspect object-cover grayscale opacity-50 blur-[2px]"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2oEDNUMyuNkLutZa59a1IXvVjyMFqpYeAja69ppFL1GW4yDXxP2zo0xRsFGw93AnNwx1JEYGE60eaKwShaiaJucIK87rabz5IddKsurmqiKTyS7K33EQAUvw5uWv_C7zzPRrPEUtI_oQvnS6hCNUMORCr-kX-UelNO-4jgSPSbT-ZFybDeokcfGGZVq9_Zwt9x_OAxlpvBYtCiwQZUGdOHbbmyv2wGWvZiNh3RL28uCaQEXVtLiT-9AvdcA45ssYSbjuG6-VJKuL7"
                />
              </div>
            </div>
          </div>
          <!-- Right Panel -->
          <aside class="w-80 flex flex-col space-y-6 shrink-0">
            <div
              class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col h-full border border-outline-variant/10"
            >
              <div class="bg-primary p-4 text-white">
                <h3 class="font-bold text-sm text-white">即時摘要</h3>
                <p class="text-xs opacity-90 text-white">
                  目前園區安全等級：正常
                </p>
              </div>
              <div class="p-4 space-y-4 flex-1">
                <div class="space-y-4">
                  <div class="p-3 bg-surface-container-low rounded-lg">
                    <p
                      class="text-[10px] font-bold text-slate-400 uppercase mb-1"
                    >
                      連線中心
                    </p>
                    <p class="text-xs font-bold text-primary">晨星托育中心</p>
                  </div>
                  <div class="p-3 bg-surface-container-low rounded-lg">
                    <p
                      class="text-[10px] font-bold text-slate-400 uppercase mb-1"
                    >
                      作用中設備
                    </p>
                    <p class="text-xs font-bold text-primary">12 支攝影機</p>
                  </div>
                </div>
              </div>
            </div>
          </aside>
        </div>

            <!-- Footer Placeholder -->
            <div id="footer-placeholder"></div>
        </main>
    </div>
</body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width,initial-scale=1.0" name="viewport"/>
  <title>兒托監管雲 - 儀表板總覽</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="lib/config.js"></script>
  <script src="lib/layout.js"></script>
</head>
<body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
  <div id="header-placeholder"></div>

  <main class="flex-1 overflow-y-auto p-10 w-full custom-scrollbar">
    <div class="space-y-8">

      <!-- 標題 + 麵包屑 -->
      <div class="border-b border-slate-100 pb-6">
        <div class="flex items-end gap-4">
          <h2 class="text-2xl font-bold text-slate-900 tracking-tight">儀表板總覽</h2>
          <div class="flex items-center text-sm text-slate-400 space-x-1.5 mb-0.5">
            <span class="material-symbols-outlined text-base">home</span>
            <span>首頁</span>
            <span class="material-symbols-outlined text-base">chevron_right</span>
            <span class="text-slate-700 font-semibold">儀表板總覽</span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-12 gap-6 items-start">
        <!-- 左側主區: 統計 + 圖表 + 行政區 -->
        <div class="col-span-12 lg:col-span-9 space-y-8">
          
          <!-- 統計卡（4欄） -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-5">
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm space-y-3">
              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">監控場所</span>
                <span class="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center">
                  <span class="material-symbols-outlined text-base text-blue-500">location_city</span>
                </span>
              </div>
              <p class="text-3xl font-bold text-slate-900">48</p>
            </div>
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm space-y-3">
              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">線上攝影機</span>
                <span class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center">
                  <span class="material-symbols-outlined text-base text-green-500">videocam</span>
                </span>
              </div>
              <p class="text-3xl font-bold text-slate-900">186<span class="text-lg text-slate-400 font-medium"> / 192</span></p>
              <p class="text-xs text-green-600 font-semibold">96.9% 上線率</p>
            </div>
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm space-y-3">
              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">今日異常</span>
                <span class="w-8 h-8 bg-red-50 rounded-lg flex items-center justify-center">
                  <span class="material-symbols-outlined text-base text-red-500">notifications_active</span>
                </span>
              </div>
              <p class="text-3xl font-bold text-red-600">3</p>
              <p class="text-xs text-amber-600 font-semibold">待處理 3 件</p>
            </div>
            <div class="bg-white border border-slate-100 rounded-2xl p-6 shadow-sm space-y-3">
              <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">本月結案</span>
                <span class="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center">
                  <span class="material-symbols-outlined text-base text-slate-500">task_alt</span>
                </span>
              </div>
              <p class="text-3xl font-bold text-slate-900">24</p>
            </div>
          </div>

          <!-- 圖表區 (Row 2 equivalent) -->
          <div class="grid grid-cols-1 md:grid-cols-12 gap-5">
            <!-- 本月告警趨勢 -->
            <div class="md:col-span-8 bg-white border border-slate-100 rounded-2xl shadow-sm p-6 space-y-4">
              <div class="flex items-center justify-between">
                <h3 class="text-base font-bold text-slate-900">本月告警趨勢</h3>
                <span class="text-xs text-slate-400 font-semibold">2024 年 4 月</span>
              </div>
              <svg viewBox="0 0 540 165" class="w-full" style="overflow:visible">
                <defs>
                  <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
                    <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.01"/>
                  </linearGradient>
                </defs>
                <line x1="40" y1="10"  x2="500" y2="10"  stroke="#f1f5f9" stroke-width="1"/>
                <line x1="40" y1="40"  x2="500" y2="40"  stroke="#f1f5f9" stroke-width="1"/>
                <line x1="40" y1="70"  x2="500" y2="70"  stroke="#f1f5f9" stroke-width="1"/>
                <line x1="40" y1="100" x2="500" y2="100" stroke="#f1f5f9" stroke-width="1"/>
                <line x1="40" y1="130" x2="500" y2="130" stroke="#e2e8f0" stroke-width="1"/>
                <polygon points="40,90 91,50 142,103 193,37 244,77 295,10 346,90 397,50 448,103 499,77 499,130 40,130" fill="url(#areaGrad)"/>
                <polyline points="40,90 91,50 142,103 193,37 244,77 295,10 346,90 397,50 448,103 499,77" fill="none" stroke="#3B82F6" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
                <circle cx="499" cy="77" r="5" fill="#1F2937" stroke="#fff" stroke-width="2.5"/>
              </svg>
            </div>
            <!-- 告警類型餅圖 -->
            <div class="md:col-span-4 bg-white border border-slate-100 rounded-2xl shadow-sm p-6 space-y-4">
              <h3 class="text-base font-bold text-slate-900">告警類型</h3>
              <div class="flex items-center justify-center">
                <svg viewBox="0 0 120 120" class="w-24 h-24" style="transform:rotate(-90deg)">
                  <circle cx="60" cy="60" r="50" fill="none" stroke="#f1f5f9" stroke-width="18"/>
                  <circle cx="60" cy="60" r="50" fill="none" stroke="#ef4444" stroke-width="18" stroke-dasharray="182 132" stroke-dashoffset="0"/>
                  <circle cx="60" cy="60" r="50" fill="none" stroke="#1F2937" stroke-width="18" stroke-dasharray="91 223" stroke-dashoffset="-182"/>
                </svg>
              </div>
              <div class="space-y-1">
                <div class="flex justify-between items-center text-xs">
                  <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-red-500"></div>鏡頭遮蔽</div>
                  <span class="font-bold">58%</span>
                </div>
                <div class="flex justify-between items-center text-xs">
                  <div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-[#1F2937]"></div>訊號中斷</div>
                  <span class="font-bold">29%</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 行政區監控 -->
          <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-6 space-y-4">
            <h3 class="text-base font-bold text-slate-900">各行政區監控狀況</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
              <div class="space-y-2">
                <div class="flex items-center justify-between"><span class="text-sm font-semibold">北屯區</span><span class="text-xs text-slate-400">46/50</span></div>
                <div class="bg-slate-100 rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full" style="width:92%"></div></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between"><span class="text-sm font-semibold">太平區</span><span class="text-xs text-slate-400">38/38</span></div>
                <div class="bg-slate-100 rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full" style="width:100%"></div></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between"><span class="text-sm font-semibold">西屯區</span><span class="text-xs text-slate-400">34/40</span></div>
                <div class="bg-slate-100 rounded-full h-1.5"><div class="bg-amber-400 h-1.5 rounded-full" style="width:85%"></div></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between"><span class="text-sm font-semibold">南區</span><span class="text-xs text-slate-400">30/31</span></div>
                <div class="bg-slate-100 rounded-full h-1.5"><div class="bg-green-500 h-1.5 rounded-full" style="width:97%"></div></div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between"><span class="text-sm font-semibold">大里區</span><span class="text-xs text-slate-400">24/33</span></div>
                <div class="bg-slate-100 rounded-full h-1.5"><div class="bg-red-500 h-1.5 rounded-full" style="width:73%"></div></div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右側：最新告警（獨立一欄） -->
        <div class="col-span-12 lg:col-span-3 space-y-4 sticky top-6">
          <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden flex flex-col h-full">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
              <h3 class="text-sm font-bold text-slate-900 flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
                最新告警
              </h3>

            </div>
          </div>
        </div><!-- /右側最新告警 -->

      </div><!-- /雙欄佈局 -->


    </div>
    <div id="footer-placeholder" class="mt-16"></div>
  </main>

  <!-- 異常處理 Modal -->
  <div id="alert-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl shadow-2xl w-[440px] overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-base font-bold text-slate-900">異常事件處理</h3>
        <button onclick="closeAlertModal()" class="w-7 h-7 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400 hover:bg-slate-200">
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div class="px-6 py-5 space-y-5">
        <div class="bg-slate-50 rounded-xl p-4 space-y-2.5">
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">設備序號</span>
            <span class="text-sm font-bold text-slate-900" id="am-device"></span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">場所名稱</span>
            <span class="text-sm font-semibold text-slate-700" id="am-location"></span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide w-16 flex-shrink-0">事件類別</span>
            <span class="text-sm font-semibold text-slate-700" id="am-type"></span>
          </div>
        </div>
        <div class="space-y-3">
          <p class="text-sm font-bold text-slate-900">選擇處理方式</p>
          <label class="flex items-start p-4 rounded-xl border-2 border-slate-100 hover:border-[#1F2937] cursor-pointer transition-all has-[:checked]:border-[#1F2937] has-[:checked]:bg-slate-50">
            <input type="radio" name="am-action" value="venue" class="mt-0.5 w-4 h-4 text-[#1F2937]" checked/>
            <div class="ml-3">
              <p class="text-sm font-bold text-slate-900">通知場所回報</p>
              <p class="text-xs text-slate-400 mt-0.5">發送通知給兒托場所，要求回報異常原因</p>
            </div>
          </label>
          <label class="flex items-start p-4 rounded-xl border-2 border-slate-100 hover:border-[#1F2937] cursor-pointer transition-all has-[:checked]:border-[#1F2937] has-[:checked]:bg-slate-50">
            <input type="radio" name="am-action" value="vendor" class="mt-0.5 w-4 h-4 text-[#1F2937]"/>
            <div class="ml-3">
              <p class="text-sm font-bold text-slate-900">通知廠商維修</p>
              <p class="text-xs text-slate-400 mt-0.5">產生設備報修單並通知維護廠商</p>
            </div>
          </label>
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500">備註說明</label>
          <textarea class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 px-4 text-sm font-semibold text-slate-900 focus:ring-2 focus:ring-slate-200 resize-none h-16" placeholder="選填..."></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
        <button onclick="closeAlertModal()" class="px-5 py-2 bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50">取消</button>
        <button class="px-5 py-2 bg-[#1F2937] text-white text-sm font-bold rounded-lg hover:bg-[#374151]">確認送出</button>
      </div>
    </div>
  </div>

  <script>
    function openAlertProcess(device, location, type) {
      document.getElementById('am-device').textContent = device;
      document.getElementById('am-location').textContent = location;
      document.getElementById('am-type').textContent = type;
      document.getElementById('alert-modal').classList.remove('hidden');
    }
    function closeAlertModal() {
      document.getElementById('alert-modal').classList.add('hidden');
    }
  </script>
</body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>權限控管與系統設定 |</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="lib/config.js"></script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c3c6d1;
        border-radius: 10px;
      }
    </style>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-surface font-body text-on-surface flex flex-col overflow-hidden h-screen w-screen">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Scrollable content area -->
        <main class="flex-1 overflow-y-auto p-8 w-full space-y-8 bg-surface-container-low custom-scrollbar">
        
        <!-- Breadcrumbs / Page Title -->
        <div class="space-y-1">
          <div
            class="flex items-center text-xs text-slate-500 font-medium space-x-2"
          >
            <span class="material-symbols-outlined text-[12px]">home</span>
            <span>首頁</span>
            <span class="material-symbols-outlined text-[12px]"
              >chevron_right</span
            >
            <span class="text-primary font-bold">帳號管理</span>
          </div>
          <h2
            class="text-3xl font-black text-primary font-headline tracking-tight"
          >
            帳號管理
          </h2>
        </div>

        <div class="grid grid-cols-12 gap-8">
          <!-- Main Settings Column -->
          <div class="col-span-12 lg:col-span-12 space-y-8">
            <section
              class="bg-white p-6 rounded-xl border border-outline-variant/10 shadow-sm"
            >
              <h3 class="font-bold text-primary mb-6 flex items-center">
                <span class="material-symbols-outlined mr-2">person_add</span>
                人員權限矩陣
              </h3>
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead
                    class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100"
                  >
                    <tr>
                      <th class="pb-3">姓名</th>
                      <th class="pb-3">角色</th>
                      <th class="pb-3">管轄區域</th>
                      <th class="pb-3">狀態</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-50">
                    <tr class="text-sm">
                      <td class="py-4 font-bold text-primary">陳大明</td>
                      <td class="py-4">管理員</td>
                      <td class="py-4">全中心</td>
                      <td class="py-4">
                        <span
                          class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold"
                          >啟用中</span
                        >
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </div>

            <!-- Footer Placeholder -->
            <div id="footer-placeholder"></div>
        </main>
    </div>
</body>
</html>

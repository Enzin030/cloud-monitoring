<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 系統管理</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
        <div class="space-y-12">
            <!-- 標題與麵包屑 左右對齊樣式 (統一基準) -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-10">
                <div class="space-y-1">
                    <h2 class="text-5xl font-black text-slate-800 font-headline tracking-tighter">系統管理</h2>
                    <p class="text-slate-400 font-bold text-sm">權限矩陣配置與管理中心設定</p>
                </div>
                <div class="flex items-center text-xs text-slate-400 font-bold space-x-2 bg-slate-50 px-6 py-2.5 rounded-full border border-slate-100">
                    <span class="material-symbols-outlined text-[14px]">home</span>
                    <span>首頁</span>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="text-slate-900 font-black tracking-tight">系統管理</span>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-12 lg:col-span-8">
                    <section class="lux-card overflow-hidden">
                      <div class="p-8 border-b border-slate-50 flex items-center justify-between">
                         <h3 class="font-black text-slate-900 tracking-tight flex items-center text-lg">
                           <span class="material-symbols-outlined mr-3 text-accent transition-all group-hover:scale-110">security</span>
                           管理權限稽核矩陣
                         </h3>
                         <button class="px-5 py-2 bg-slate-900 text-white text-[11px] font-black rounded-xl shadow-lg">新增人員</button>
                      </div>
                      
                      <div class="overflow-x-auto">
                        <table class="w-full text-left">
                          <thead class="bg-slate-50/50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100">
                            <tr>
                              <th class="px-8 py-5">管理員名稱</th>
                              <th class="px-8 py-5">職責角色</th>
                              <th class="px-8 py-5">授權管轄範圍</th>
                              <th class="px-8 py-5">帳號狀態</th>
                            </tr>
                          </thead>
                          <tbody class="divide-y divide-slate-50">
                            <tr class="hover:bg-slate-50/30 transition-all">
                              <td class="px-8 py-6">
                                <p class="text-sm font-black text-slate-900">陳大明</p>
                                <p class="text-[10px] text-slate-410 font-bold">STAFF_ID: ADM-022</p>
                              </td>
                              <td class="px-8 py-6">
                                <span class="px-3 py-1 bg-slate-100 text-slate-900 text-[10px] font-black rounded-lg">總管中心管理員</span>
                              </td>
                              <td class="px-8 py-6 text-sm font-bold text-slate-600">全區中心管轄</td>
                              <td class="px-8 py-6">
                                <span class="flex items-center text-emerald-600 text-[11px] font-black">
                                    <div class="w-2 h-2 rounded-full bg-emerald-500 mr-2 shadow-sm shadow-emerald-200"></div>
                                    已授權啟用
                                </span>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </section>
                </div>
                
                <div class="col-span-12 lg:col-span-4">
                    <div class="bg-slate-950 p-10 rounded-[2.5rem] text-white shadow-lux border border-white/5 space-y-6">
                        <div class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center mb-2">
                            <span class="material-symbols-outlined text-white">admin_panel_settings</span>
                        </div>
                        <h4 class="text-xl font-black tracking-tight">安全中心提示</h4>
                        <p class="text-xs leading-relaxed text-slate-500 font-medium pb-4 border-b border-white/10">
                            系統管理員擁有完整之監控調閱權限與報表產出權限，請確保帳號僅限於管理中心內部場景使用。
                        </p>
                        <div class="flex items-center justify-between pt-2">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">最後登錄稽核</span>
                            <span class="text-xs font-black text-white">2023.10.19 14:22</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

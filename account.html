<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 系統管理</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-10 w-full custom-scrollbar">
      <div class="space-y-10">
        <!-- 標題與麵包屑 -->
        <div class="border-b border-slate-100 pb-6 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">系統管理</h2>
            <div class="flex items-center text-sm text-slate-400 font-medium space-x-2 mb-1">
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]">chevron_right</span>
              <span class="text-slate-800 font-semibold tracking-tight">系統管理</span>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
          <!-- Left: 側邊選單 -->
          <div class="col-span-12 lg:col-span-3">
            <div class="lux-card p-4 space-y-1">
              <button class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-[#1F2937] text-white font-semibold text-sm transition-all">
                <span class="material-symbols-outlined text-base">group</span>
                <span>群組權限</span>
              </button>
              <button class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-600 font-medium text-sm hover:bg-slate-50 transition-all">
                <span class="material-symbols-outlined text-base">manage_accounts</span>
                <span>帳號管理</span>
              </button>
            </div>
          </div>

          <!-- Right: 主內容 -->
          <div class="col-span-12 lg:col-span-9 space-y-6">
            <!-- 群組權限區塊 -->
            <section class="lux-card overflow-hidden">
              <div class="p-6 border-b border-slate-50 flex items-center justify-between">
                <h3 class="font-bold text-slate-900 tracking-tight flex items-center text-xl">
                  <span class="w-2 h-6 bg-accent rounded-full mr-3 shadow-sm"></span>
                  群組權限管理
                </h3>
                <button class="px-4 py-1.5 bg-[#1F2937] text-white text-xs font-semibold rounded-lg hover:bg-[#374151] transition-all flex items-center space-x-1">
                  <span class="material-symbols-outlined text-sm">add</span>
                  <span>新增群組</span>
                </button>
              </div>
              
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="bg-slate-50/50 text-[10px] font-semibold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                    <tr>
                      <th class="px-6 py-4">群組名稱</th>
                      <th class="px-6 py-4">成員數</th>
                      <th class="px-6 py-4">管轄範圍</th>
                      <th class="px-6 py-4">狀態</th>
                      <th class="px-6 py-4 text-right">功能</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-50">
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <p class="text-sm font-semibold text-slate-900">總管理員</p>
                      </td>
                      <td class="px-6 py-5">
                        <span class="text-sm font-semibold text-slate-900">3</span>
                        <span class="text-xs text-slate-400 ml-0.5">人</span>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">全區</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-emerald-600 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 shadow-sm shadow-emerald-200"></div>
                          已啟用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">
                          編輯
                        </button>
                      </td>
                    </tr>
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <p class="text-sm font-semibold text-slate-900">區域管理員</p>
                      </td>
                      <td class="px-6 py-5">
                        <span class="text-sm font-semibold text-slate-900">8</span>
                        <span class="text-xs text-slate-400 ml-0.5">人</span>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">指定行政區</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-emerald-600 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 shadow-sm shadow-emerald-200"></div>
                          已啟用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">
                          編輯
                        </button>
                      </td>
                    </tr>
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <p class="text-sm font-semibold text-slate-900">場所檢視員</p>
                      </td>
                      <td class="px-6 py-5">
                        <span class="text-sm font-semibold text-slate-900">15</span>
                        <span class="text-xs text-slate-400 ml-0.5">人</span>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">指定場所</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-emerald-600 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5 shadow-sm shadow-emerald-200"></div>
                          已啟用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">
                          編輯
                        </button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>

            <!-- 帳號管理區塊 -->
            <section class="lux-card overflow-hidden">
              <div class="p-6 border-b border-slate-50 flex items-center justify-between">
                <h3 class="font-bold text-slate-900 tracking-tight flex items-center text-xl">
                  <span class="w-2 h-6 bg-accent rounded-full mr-3 shadow-sm"></span>
                  帳號管理
                </h3>
                <button class="px-4 py-1.5 bg-[#1F2937] text-white text-xs font-semibold rounded-lg hover:bg-[#374151] transition-all flex items-center space-x-1">
                  <span class="material-symbols-outlined text-sm">person_add</span>
                  <span>新增帳號</span>
                </button>
              </div>
              
              <div class="overflow-x-auto">
                <table class="w-full text-left">
                  <thead class="bg-slate-50/50 text-[10px] font-semibold text-slate-400 uppercase tracking-widest border-b border-slate-100">
                    <tr>
                      <th class="px-6 py-4">帳號名稱</th>
                      <th class="px-6 py-4">所屬群組</th>
                      <th class="px-6 py-4">管轄範圍</th>
                      <th class="px-6 py-4">帳號狀態</th>
                      <th class="px-6 py-4 text-right">功能</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-50">
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <div class="flex items-center space-x-2">
                          <span class="material-symbols-outlined text-[18px] text-[#1F2937]" style="font-variation-settings: 'FILL' 1">account_circle</span>
                          <div>
                            <p class="text-sm font-semibold text-slate-900">陳大明</p>
                            <p class="text-[10px] text-slate-400">ADM-022</p>
                          </div>
                        </div>
                      </td>
                      <td class="px-6 py-5">
                        <span class="px-2.5 py-0.5 bg-red-50 text-red-600 text-[10px] font-semibold rounded-full border border-red-100">總管理員</span>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">全區中心</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-emerald-600 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></div>
                          已啟用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right space-x-2">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">編輯</button>
                        <button class="px-3 py-1 text-red-500 text-[11px] font-semibold rounded-lg hover:bg-red-50 transition-all">停用</button>
                      </td>
                    </tr>
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <div class="flex items-center space-x-2">
                          <span class="material-symbols-outlined text-[18px] text-[#1F2937]" style="font-variation-settings: 'FILL' 1">account_circle</span>
                          <div>
                            <p class="text-sm font-semibold text-slate-900">林小元</p>
                            <p class="text-[10px] text-slate-400">ADM-035</p>
                          </div>
                        </div>
                      </td>
                      <td class="px-6 py-5">
                        <span class="px-2.5 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-semibold rounded-full border border-blue-100">區域管理員</span>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">北屯區、太平區</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-emerald-600 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></div>
                          已啟用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right space-x-2">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">編輯</button>
                        <button class="px-3 py-1 text-red-500 text-[11px] font-semibold rounded-lg hover:bg-red-50 transition-all">停用</button>
                      </td>
                    </tr>
                    <tr class="hover:bg-slate-50/30 transition-all">
                      <td class="px-6 py-5">
                        <div class="flex items-center space-x-2">
                          <span class="material-symbols-outlined text-[18px] text-slate-400" style="font-variation-settings: 'FILL' 1">account_circle</span>
                          <div>
                            <p class="text-sm font-semibold text-slate-900">王美麗</p>
                            <p class="text-[10px] text-slate-400">ADM-048</p>
                          </div>
                        </div>
                      </td>
                      <td class="px-6 py-5">
                        <p class="text-sm font-semibold text-slate-900">場所檢視員</p>
                      </td>
                      <td class="px-6 py-5 text-sm font-medium text-slate-600">南區中心</td>
                      <td class="px-6 py-5">
                        <span class="flex items-center text-slate-400 text-[11px] font-semibold">
                          <div class="w-1.5 h-1.5 rounded-full bg-slate-300 mr-1.5"></div>
                          已停用
                        </span>
                      </td>
                      <td class="px-6 py-5 text-right space-x-2">
                        <button class="px-3 py-1 text-slate-500 text-[11px] font-semibold rounded-lg hover:bg-slate-100 transition-all">編輯</button>
                        <button class="px-3 py-1 text-emerald-500 text-[11px] font-semibold rounded-lg hover:bg-emerald-50 transition-all">啟用</button>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        </div>
      </div>

      <div id="footer-placeholder" class="mt-16"></div>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兒托監管雲 - CCTV 模擬預覽</title>
<style>
  body {
    margin: 0;
    padding: 40px;
    background: #111;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
  }
  .cctv-container {
    position: relative;
    width: 640px;
    height: 360px;
    background-color: #000;
    overflow: hidden;
    border: 3px solid #333;
    border-radius: 4px;
  }
  .cctv-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: contrast(1.15) saturate(0.5) brightness(0.95);
    animation: panCamera 30s infinite alternate ease-in-out;
  }
  .scanlines {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 0, 0, 0.12),
      rgba(0, 0, 0, 0.12) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
  }
  .osd {
    position: absolute;
    color: #FFF;
    font-size: 13px;
    font-weight: bold;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    z-index: 10;
  }
  .top-left { top: 12px; left: 12px; }
  .top-right { top: 12px; right: 12px; display: flex; align-items: center; color: #FF3B30; }
  .bottom-left { bottom: 12px; left: 12px; font-size: 11px; color: #ccc; }
  .bottom-right { bottom: 12px; right: 12px; }
  .rec-dot {
    width: 10px;
    height: 10px;
    background-color: #FF3B30;
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes panCamera {
    0% { transform: scale(1.05) translate(0, 0); }
    50% { transform: scale(1.08) translate(-1.5%, 0.5%); }
    100% { transform: scale(1.05) translate(1.5%, -0.5%); }
  }
</style>
</head>
<body>

<!-- CAM-01 正門大門區 -->
<div class="cctv-container">
  <img class="cctv-image" src="assets/images/cctv1.png" alt="CAM-01" />
  <div class="scanlines"></div>
  <div class="osd top-left">CAM-00104 正門大門區</div>
  <div class="osd top-right"><div class="rec-dot"></div>REC</div>
  <div class="osd bottom-left">北屯區 - 北屯中心</div>
  <div class="osd bottom-right clock"></div>
</div>

<!-- CAM-02 室內遊戲區 -->
<div class="cctv-container">
  <img class="cctv-image" src="assets/images/cctv2.png" alt="CAM-02" />
  <div class="scanlines"></div>
  <div class="osd top-left">CAM-00213 室內遊戲區</div>
  <div class="osd top-right"><div class="rec-dot"></div>REC</div>
  <div class="osd bottom-left">北屯區 - 北屯中心</div>
  <div class="osd bottom-right clock"></div>
</div>

<!-- CAM-03 玩具及圖書區 -->
<div class="cctv-container">
  <img class="cctv-image" src="assets/images/cctv3.png" alt="CAM-03" />
  <div class="scanlines"></div>
  <div class="osd top-left">CAM-00302 玩具及圖書區</div>
  <div class="osd top-right"><div class="rec-dot"></div>REC</div>
  <div class="osd bottom-left">西屯區 - 西屯中心</div>
  <div class="osd bottom-right clock"></div>
</div>

<!-- CAM-04 備餐區入口 -->
<div class="cctv-container">
  <img class="cctv-image" src="assets/images/cctv4.png" alt="CAM-04" />
  <div class="scanlines"></div>
  <div class="osd top-left">CAM-00455 備餐區入口</div>
  <div class="osd top-right"><div class="rec-dot"></div>REC</div>
  <div class="osd bottom-left">太平區 - 太平中心</div>
  <div class="osd bottom-right clock"></div>
</div>

<script>
  function updateClocks() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const h = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    const text = `${y}-${m}-${d} ${h}:${mi}:${s}`;
    document.querySelectorAll('.clock').forEach(el => el.textContent = text);
  }
  setInterval(updateClocks, 1000);
  updateClocks();
</script>

</body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 監控控制台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body
    class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden"
  >
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-10 w-full custom-scrollbar">
      <div class="space-y-8">
        <!-- 標題與麵包屑 -->
        <div class="border-b border-slate-100 pb-6 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-2xl font-bold text-slate-900 tracking-tight">
              監控控制台
            </h2>
            <div
              class="flex items-center text-sm text-slate-400 font-medium space-x-2 mb-1"
            >
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]"
                >chevron_right</span
              >
              <span class="text-slate-800 font-semibold tracking-tight"
                >監控控制台</span
              >
            </div>
          </div>
        </div>

        <!-- 控制面板 -->
        <section
          class="lux-card p-6 flex flex-wrap items-center justify-between gap-6"
        >
          <div class="flex items-center gap-6 flex-wrap">
            <!-- Mode Switch -->
            <div class="flex bg-slate-100 p-1 rounded-lg">
              <button
                class="px-5 py-2 rounded-md text-sm font-medium text-slate-500 hover:text-slate-900 whitespace-nowrap"
              >
                實時監看
              </button>
              <button
                class="px-5 py-2 rounded-md text-sm font-semibold bg-white text-slate-900 shadow-sm whitespace-nowrap"
              >
                歷史回放
              </button>
            </div>

            <div class="w-px h-7 bg-slate-200"></div>

            <!-- 場所名稱：兩個下拉左右排列 -->
            <div class="flex items-center gap-3">
              <select
                class="bg-slate-50 border-none rounded-lg text-sm font-semibold text-slate-800 py-2 px-4 focus:ring-2 focus:ring-slate-100 min-w-[140px]"
              >
                <option>選擇行政區</option>
                <option selected>北屯區</option>
                <option>太平區</option>
                <option>南區</option>
              </select>
              <select
                class="bg-slate-50 border-none rounded-lg text-sm font-semibold text-slate-800 py-2 px-4 focus:ring-2 focus:ring-slate-100 min-w-[140px]"
              >
                <option>選擇場所</option>
                <option selected>北屯中心</option>
                <option>太平中心</option>
                <option>南區中心</option>
              </select>
            </div>

            <div class="w-px h-7 bg-slate-200"></div>

            <!-- 調閱時間區段 -->
            <div
              class="flex items-center bg-slate-50 px-4 py-2 rounded-lg border border-slate-100 space-x-2"
            >
              <span class="material-symbols-outlined text-accent text-base"
                >calendar_month</span
              >
              <input
                type="date"
                value="2024-04-17"
                class="bg-transparent border-none p-0 text-sm font-semibold text-slate-800 focus:ring-0 w-[120px]"
              />
              <span class="text-slate-300 font-medium text-xs">至</span>
              <input
                type="time"
                value="08:00"
                class="bg-transparent border-none p-0 text-sm font-semibold text-slate-800 focus:ring-0 w-[70px]"
              />
              <span class="text-slate-300 text-xs">-</span>
              <input
                type="time"
                value="12:00"
                class="bg-transparent border-none p-0 text-sm font-semibold text-slate-800 focus:ring-0 w-[70px]"
              />
            </div>
          </div>

          <button
            class="px-5 py-2 bg-[#1F2937] text-white rounded-lg text-sm font-semibold hover:bg-[#374151] transition-all active:scale-95 flex items-center space-x-1.5"
          >
            <span class="material-symbols-outlined text-base">search</span>
            <span>查詢</span>
          </button>
        </section>

        <!-- Video Player Area -->
        <div class="grid grid-cols-12 gap-8">
          <div class="col-span-12 lg:col-span-9 space-y-6">
            <!-- Main Feed -->
            <div
              class="relative lux-card aspect-video overflow-hidden bg-black shadow-lux"
            >
              <img
                class="w-full h-full object-cover opacity-90 filter contrast-125 saturate-50"
                src="assets/images/cctv1.png"
              />
              <!-- 統一標籤格式 -->
              <div
                class="absolute top-8 left-8 bg-slate-900/90 backdrop-blur-2xl px-5 py-3 rounded-xl text-white flex flex-col border border-white/10 shadow-2xl"
              >
                <span
                  class="text-[10px] font-semibold text-accent uppercase tracking-[0.2em] leading-none mb-0.5"
                  >ID: CAM-00104</span
                >
                <span class="text-sm font-semibold tracking-tight"
                  >北屯中心 • 正門大門區</span
                >
              </div>
            </div>

            <!-- 下方區間選擇器：播放按鈕左 + 進度條 + 匯出按鈕右 -->
            <div
              class="lux-card p-6 bg-slate-50/50 border border-slate-100 space-y-6"
            >
              <div class="flex items-center gap-4 w-full">
                <!-- Play Button 放最左 -->
                <button
                  class="w-10 h-10 rounded-lg bg-[#1F2937] flex items-center justify-center text-white shadow-sm hover:bg-[#374151] transition-all flex-shrink-0"
                >
                  <span class="material-symbols-outlined text-xl"
                    >play_arrow</span
                  >
                </button>

                <!-- 進度條 -->
                <div class="flex-1 relative">
                  <div
                    class="h-6 bg-slate-200/50 rounded-full relative overflow-hidden"
                  >
                    <div
                      class="absolute h-full left-[15%] w-[45%] bg-accent/20 border-x-2 border-accent flex items-center justify-center"
                    >
                      <span
                        class="text-[9px] font-semibold text-accent uppercase tracking-widest"
                        >匯出範圍: 01:30 - 02:30</span
                      >
                    </div>
                  </div>
                  <div
                    class="absolute -top-3 left-[35%] flex flex-col items-center"
                  >
                    <div
                      class="w-1.5 h-16 bg-red-600 rounded-full shadow-lg z-20"
                    ></div>
                    <div
                      class="bg-red-600 text-white text-[9px] font-semibold px-2 py-0.5 mt-1 rounded-full shadow-md"
                    >
                      01:45
                    </div>
                  </div>

                  <div
                    class="flex justify-between mt-4 text-[10px] font-semibold text-slate-400 tracking-widest"
                  >
                    <span>01:00</span>
                    <span class="text-slate-900">01:30</span>
                    <span>02:00</span>
                    <span class="text-slate-900">02:30</span>
                    <span>03:00</span>
                  </div>
                </div>

                <!-- 匯出按鈕放最右 -->
                <button
                  class="flex items-center px-4 py-2 bg-accent text-white rounded-lg text-xs font-semibold shadow-sm hover:bg-blue-600 transition-all flex-shrink-0"
                >
                  <span class="material-symbols-outlined mr-1.5 text-sm"
                    >download</span
                  >
                  匯出錄影
                </button>
              </div>
            </div>
          </div>

          <!-- Right: Side Info -->
          <div class="col-span-12 lg:col-span-3 space-y-6">
            <div class="lux-card p-6 space-y-5">
              <div class="border-b border-slate-100 pb-3">
                <h3
                  class="text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-1"
                >
                  同場所關聯設備
                </h3>
                <span
                  class="text-sm font-semibold text-slate-900 flex items-center"
                >
                  <span
                    class="material-symbols-outlined text-sm mr-1.5 text-accent"
                    >pin_drop</span
                  >北屯區 - 北屯中心
                </span>
              </div>
              <div class="space-y-3">
                <div
                  class="p-4 bg-slate-50 border-2 border-slate-900 rounded-xl shadow-sm"
                >
                  <p
                    class="text-[10px] font-semibold text-accent tracking-widest mb-0.5 uppercase"
                  >
                    ID: CAM-00104
                  </p>
                  <p class="text-sm font-semibold text-slate-900">正門大門區</p>
                </div>
                <div
                  class="p-4 border border-slate-100 rounded-xl hover:bg-slate-50 cursor-pointer transition-colors"
                >
                  <p
                    class="text-[10px] font-semibold text-slate-400 tracking-widest mb-0.5 uppercase"
                  >
                    ID: CAM-00105
                  </p>
                  <p class="text-sm font-semibold text-slate-700">後側遊戲場</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="footer-placeholder" class="mt-16"></div>
    </main>
  </body>
</html>

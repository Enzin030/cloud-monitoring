<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 監控控制台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body
    class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden"
  >
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
      <div class="space-y-10">
        <!-- 標題與麵包屑並排佈局 -->
        <div class="border-b border-slate-100 pb-8 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-3xl font-medium text-slate-900 tracking-tight">
              監控控制台
            </h2>
            <div
              class="flex items-center text-sm text-slate-400 font-medium space-x-2 mb-1.5"
            >
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]"
                >chevron_right</span
              >
              <span class="text-slate-800 font-medium tracking-tight"
                >監控控制台</span
              >
            </div>
          </div>
        </div>

        <!-- 控制面板 -->
        <section
          class="lux-card p-8 flex flex-col md:flex-row items-center justify-between gap-8"
        >
          <div class="flex items-center gap-10">
            <!-- Mode Switch -->
            <div class="flex bg-slate-100 p-1.5 rounded-xl">
              <button
                class="px-8 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:text-slate-900 whitespace-nowrap flex-shrink-0"
              >
                實時監看
              </button>
              <button
                class="px-8 py-2.5 rounded-lg text-sm font-medium bg-white text-slate-900 shadow-md whitespace-nowrap flex-shrink-0"
              >
                歷史回放
              </button>
            </div>

            <div class="w-px h-8 bg-slate-200"></div>

            <!-- 篩選器 -->
            <div class="flex items-center gap-6">
              <div class="flex flex-col">
                <span
                  class="text-[9px] font-medium text-slate-400 uppercase tracking-widest mb-1"
                  >調閱場所</span
                >
                <select
                  class="bg-slate-50 border-none rounded-xl text-sm font-medium text-slate-800 py-3 px-6 focus:ring-2 focus:ring-slate-100 min-w-[240px]"
                >
                  <option>選擇 行政區 - 場所...</option>
                  <option selected>北屯區 - 北屯中心</option>
                  <option>太平區 - 太平中心</option>
                </select>
              </div>

              <div class="flex flex-col">
                <span
                  class="text-[9px] font-medium text-slate-400 uppercase tracking-widest mb-1.5 ml-1"
                  >調閱時間區段</span
                >
                <div
                  class="flex items-center bg-slate-50 px-5 py-3 rounded-xl border border-slate-100 space-x-3"
                >
                  <span class="material-symbols-outlined text-accent text-lg"
                    >calendar_month</span
                  >
                  <input
                    type="date"
                    value="2024-04-17"
                    class="bg-transparent border-none p-0 text-sm font-medium text-slate-800 focus:ring-0"
                  />
                  <span class="text-slate-300 font-medium px-1">-</span>
                  <input
                    type="time"
                    value="08:00"
                    class="bg-transparent border-none p-0 text-sm font-medium text-slate-800 focus:ring-0"
                  />
                  <span class="text-slate-300 font-medium px-1 text-xs">至</span>
                  <input
                    type="time"
                    value="12:00"
                    class="bg-transparent border-none p-0 text-sm font-medium text-slate-800 focus:ring-0"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <button
              class="px-10 py-4 bg-slate-900 text-white rounded-2xl text-sm font-medium shadow-lux hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center space-x-2"
            >
              <span class="material-symbols-outlined text-[18px]">search</span>
              <span>查詢</span>
            </button>
          </div>
        </section>

        <!-- Video Player Area -->
        <div class="grid grid-cols-12 gap-10">
          <div class="col-span-12 lg:col-span-9 space-y-8">
            <!-- Main Feed -->
            <div
              class="relative lux-card aspect-video overflow-hidden bg-black shadow-lux"
            >
              <img
                class="w-full h-full object-cover opacity-90 filter contrast-125 saturate-50"
                src="assets/images/cctv1.png"
              />
              <!-- 統一標籤格式 -->
              <div
                class="absolute top-10 left-10 bg-slate-900/90 backdrop-blur-2xl px-6 py-4 rounded-[1.5rem] text-white flex flex-col border border-white/10 shadow-2xl"
              >
                <span
                  class="text-[10px] font-medium text-accent uppercase tracking-[0.2em] leading-none mb-1"
                  >ID: CAM-00104</span
                >
                <span class="text-sm font-medium tracking-tight"
                  >北屯中心 • 正門大門區</span
                >
              </div>
            </div>

            <!-- 下方區間選擇器 & 匯出按鈕 -->
            <div
              class="lux-card p-10 bg-slate-50/50 border border-slate-100 space-y-10"
            >
              <div class="flex items-center justify-between w-full">
                <!-- Play Button 放最左 -->
                <div
                  class="w-16 h-16 rounded-[1.25rem] bg-slate-900 border-2 border-slate-800 flex items-center justify-center text-white shadow-lux group cursor-pointer hover:bg-slate-800 hover:scale-105 transition-all flex-shrink-0"
                >
                  <span class="material-symbols-outlined text-4xl"
                    >play_arrow</span
                  >
                </div>

                <!-- 匯出範圍按鈕縮小，置中 -->
                <button
                  class="flex items-center px-6 py-3 bg-accent text-white rounded-xl text-xs font-medium shadow-lg shadow-blue-500/20 hover:bg-blue-600 transition-all mx-auto"
                >
                  <span class="material-symbols-outlined mr-2 text-sm"
                    >download</span
                  >
                  匯出選取範圍錄影庫
                </button>

                <!-- 時間碼顯示 放最右 -->
                <div class="text-right flex-shrink-0 flex items-center gap-6">
                  <div class="text-right">
                    <p
                      class="text-[10px] font-medium text-slate-400 uppercase tracking-widest"
                    >
                      播放時段計時
                    </p>
                    <p
                      class="text-3xl font-medium text-slate-900 tracking-tighter mt-1 tabular-nums font-mono"
                    >
                      01:45:22
                      <span class="text-slate-300 font-medium ml-1">/ 03:00</span>
                    </p>
                  </div>
                </div>
              </div>

              <!-- 區間拉動模擬 (1:30 - 2:30) -->
              <div class="relative pt-6">
                <div
                  class="h-8 bg-slate-200/50 rounded-full relative overflow-hidden backdrop-blur-sm"
                >
                  <div
                    class="absolute h-full left-[15%] w-[45%] bg-accent/20 border-x-4 border-accent flex items-center justify-center"
                  >
                    <span
                      class="text-[10px] font-medium text-accent uppercase tracking-widest"
                      >選定匯出範圍: 01:30 - 02:30</span
                    >
                  </div>
                </div>
                <div
                  class="absolute -top-6 left-[35%] flex flex-col items-center"
                >
                  <div
                    class="w-2 h-24 bg-red-600 rounded-full shadow-2xl z-20"
                  ></div>
                  <div
                    class="bg-red-600 text-white text-[10px] font-medium px-3 py-1 mt-2 rounded-full shadow-lg"
                  >
                    01:45
                  </div>
                </div>

                <div
                  class="flex justify-between mt-8 text-[11px] font-medium text-slate-400 tracking-widest uppercase"
                >
                  <span>01:00</span>
                  <span class="text-slate-900">01:30</span>
                  <span>02:00</span>
                  <span class="text-slate-900">02:30</span>
                  <span>03:00</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Right: Side Info -->
          <div class="col-span-12 lg:col-span-3 space-y-8">
            <div class="lux-card p-8 space-y-6">
              <div class="border-b border-slate-100 pb-4">
                <h3
                  class="text-[11px] font-medium text-slate-400 uppercase tracking-widest mb-1.5"
                >
                  同場所關聯設備
                </h3>
                <span
                  class="text-sm font-medium text-slate-900 flex items-center"
                >
                  <span
                    class="material-symbols-outlined text-sm mr-1.5 text-accent"
                    >pin_drop</span
                  >北屯區 - 北屯中心
                </span>
              </div>
              <div class="space-y-4">
                <div
                  class="p-5 bg-slate-50 border-2 border-slate-900 rounded-[1.5rem] shadow-sm"
                >
                  <p
                    class="text-[10px] font-medium text-accent tracking-widest mb-1 uppercase"
                  >
                    ID: CAM-00104
                  </p>
                  <p class="text-sm font-medium text-slate-900">正門大門區</p>
                </div>
                <div
                  class="p-5 border border-slate-100 rounded-[1.5rem] hover:bg-slate-50 cursor-pointer transition-colors backdrop-blur-sm"
                >
                  <p
                    class="text-[10px] font-medium text-slate-400 tracking-widest mb-1 uppercase"
                  >
                    ID: CAM-00105
                  </p>
                  <p class="text-sm font-medium text-slate-700">後側遊戲場</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 監控控制台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto w-full custom-scrollbar">
        <div class="px-12 py-10 space-y-10">
            <!-- 標題與麵包屑 -->
            <div class="flex items-center justify-between border-b border-slate-100 pb-10">
                <div class="space-y-1">
                    <h2 class="text-4xl font-black text-slate-900 font-headline tracking-tighter">監控控制台</h2>
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Multi-View Monitoring & History Playback Control</p>
                </div>
                <div class="flex items-center text-[10px] text-slate-400 font-black space-x-2 bg-slate-50 px-6 py-2.5 rounded-full border border-slate-100 uppercase tracking-widest">
                    <span class="material-symbols-outlined text-[14px]">home</span>
                    <span>Home</span>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="text-slate-900">Console</span>
                </div>
            </div>

            <div class="grid grid-cols-12 gap-10">
                <!-- 左側篩選面板 -->
                <div class="col-span-12 lg:col-span-3 space-y-8">
                    <section class="lux-card p-8 bg-slate-50/50 border-slate-100">
                      <h3 class="font-black text-slate-900 tracking-tight flex items-center mb-6">
                        <span class="material-symbols-outlined mr-3 text-accent transition-transform hover:rotate-12">filter_alt</span>
                        調閱篩選條件
                      </h3>
                      <div class="space-y-6">
                        <div class="space-y-2">
                          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">選擇區域場所</label>
                          <select class="w-full bg-white border-slate-200 rounded-xl text-xs font-black py-4 px-5 focus:ring-2 focus:ring-slate-100 shadow-sm appearance-none">
                            <option>選擇行政區 - 場所...</option>
                            <option selected>北屯區 - 晨星中心</option>
                            <option>太平區 - 陽光幼兒中心</option>
                            <option>西屯區 - 快樂兒托所</option>
                          </select>
                        </div>
                        <div class="space-y-2">
                          <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">回放日期區間</label>
                          <input class="w-full bg-white border-slate-200 rounded-xl text-xs font-black py-4 px-5" type="date" value="2023-11-20" />
                        </div>
                        <button class="w-full py-4.5 bg-[#1F2937] text-white text-xs font-black rounded-xl hover:bg-slate-800 transition-all shadow-xl active:scale-95">搜尋回放影像</button>
                      </div>
                    </section>
                </div>

                <!-- 右側畫面播放區 -->
                <div class="col-span-12 lg:col-span-9 space-y-8">
                    <div class="lux-card aspect-video bg-slate-950 relative overflow-hidden group">
                        <!-- Playback Mockup -->
                         <img class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDX8O2MzXTVCuW9sGLxn9iRA6mqnNVKmxgV7OkU1ADbqvkWC3pnswugr39k_06jvDJ94ok6Kx-nAyyNckSsuvCHqtRphrF2YjZxbtew2e1y-dEQLwn6XyDQEJVxsDo1XnKIVAFPBMiLYjVlHz-XUfsSPUe8JF6pyzMspQEvUpA3qpnVDDmiktVINNXIgUqzRlFXGGKD97JVDL0i--Zac_jaqn1Zfo2QeywFaSjEUHIwf2SNshXeXI8_lZW6g5KH0XhnsF1VxVe5AJxJ"/>
                         <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-slate-950 to-transparent p-10 space-y-8">
                            <!-- 時間軸拉桿 (交互區) -->
                            <div class="space-y-4">
                                <div class="flex items-center justify-between text-white/60 text-[10px] font-black uppercase tracking-widest">
                                    <span>09:00</span>
                                    <span class="text-white text-xs px-3 py-1 bg-accent rounded-full">10:32:04</span>
                                    <span>21:00</span>
                                </div>
                                <div class="relative h-2 bg-white/10 rounded-full cursor-pointer overflow-hidden group/timeline">
                                    <div class="absolute left-0 top-0 h-full bg-accent w-1/3 shadow-[0_0_20px_rgba(37,99,235,0.5)]"></div>
                                    <div class="absolute left-1/3 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-2xl scale-0 group-hover/timeline:scale-100 transition-transform"></div>
                                </div>
                            </div>
                            
                            <!-- 功能控制列 -->
                            <div class="flex items-center justify-between border-t border-white/10 pt-8">
                                <div class="flex items-center space-x-8">
                                    <button class="text-white hover:scale-110 transition-transform"><span class="material-symbols-outlined text-3xl">play_circle</span></button>
                                    <button class="text-white/60 hover:text-white transition-colors"><span class="material-symbols-outlined">fast_rewind</span></button>
                                    <button class="text-white/60 hover:text-white transition-colors"><span class="material-symbols-outlined">fast_forward</span></button>
                                    <div class="w-px h-6 bg-white/10 mx-2"></div>
                                    <button class="text-white/60 hover:text-white transition-colors"><span class="material-symbols-outlined">volume_up</span></button>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <button class="px-8 py-3.5 bg-emerald-600 text-white text-xs font-black rounded-xl hover:bg-emerald-500 transition-all flex items-center shadow-lg active:scale-95">
                                        <span class="material-symbols-outlined mr-2">download</span>
                                        匯出選取範圍錄影
                                    </button>
                                    <button class="w-12 h-12 bg-white/10 text-white rounded-xl flex items-center justify-center hover:bg-white/20 transition-all"><span class="material-symbols-outlined">fullscreen</span></button>
                                </div>
                            </div>
                         </div>

                         <!-- 鏡頭浮水印 -->
                         <div class="absolute top-8 left-8 flex items-center space-x-4 bg-slate-900/60 backdrop-blur-md px-6 py-4 rounded-[2rem] border border-white/10">
                            <div class="w-3 h-3 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-1">ID: CAM-00104</span>
                                <span class="text-sm font-black text-white tracking-tight">北屯區 - 晨星中心 • 正門大門區</span>
                            </div>
                         </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
  </body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 監控控制台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
        <div class="space-y-10">
            <!-- 標題與麵包屑 左右對齊 -->
            <div class="flex items-end justify-between border-b border-slate-100 pb-8">
                <div>
                    <h2 class="text-5xl font-black text-slate-800 font-headline tracking-tighter">監控控制台</h2>
                    <p class="text-slate-400 font-bold mt-2">歷史回放調閱與實時監看</p>
                </div>
                <div class="flex items-center text-xs text-slate-400 font-bold space-x-2 bg-slate-50 px-4 py-2 rounded-full">
                    <span class="material-symbols-outlined text-[14px]">home</span>
                    <span>首頁</span>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="text-slate-900">監控控制台</span>
                </div>
            </div>

            <!-- 控制面板：預設選中歷史回放 -->
            <section class="lux-card p-8 flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="flex items-center gap-8">
                    <!-- Mode Switch -->
                    <div class="flex bg-slate-100 p-1.5 rounded-xl">
                      <button class="px-6 py-2 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-900">即時監看</button>
                      <button class="px-6 py-2 rounded-lg text-sm font-black bg-white text-slate-900 shadow-md ring-1 ring-black/5">歷史回放</button>
                    </div>

                    <div class="w-px h-8 bg-slate-200"></div>

                    <!-- 篩選器 -->
                    <div class="flex items-center gap-4">
                        <select class="bg-slate-50 border-none rounded-xl text-sm font-bold text-slate-700 py-2.5 px-6 focus:ring-2 focus:ring-slate-200 min-w-[200px]">
                            <option>選擇兒托場所...</option>
                            <option selected>北屯中心 - 大班教室</option>
                            <option>太平中心 - 備餐區</option>
                        </select>
                        
                        <div class="flex items-center bg-slate-50 px-6 py-2 rounded-xl space-x-4">
                            <span class="material-symbols-outlined text-slate-400 text-lg">calendar_month</span>
                            <input type="date" value="2023-11-20" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 focus:ring-0">
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <button class="flex items-center px-6 py-3 bg-white border border-slate-200 rounded-xl text-sm font-black text-slate-600 hover:bg-slate-50 transition-all active:scale-95">
                        <span class="material-symbols-outlined mr-2">download</span>
                        匯出此段錄影
                    </button>
                    <button class="flex items-center px-8 py-3 bg-slate-900 text-white rounded-xl text-sm font-black shadow-lg hover:bg-slate-800 transition-all active:scale-95">
                      <span class="material-symbols-outlined mr-2">search</span>
                      執行檢索
                    </button>
                </div>
            </section>

            <!-- Video Player Area -->
            <div class="grid grid-cols-12 gap-10">
                <div class="col-span-12 lg:col-span-9 space-y-8">
                    <!-- Main Feed -->
                    <div class="relative lux-card aspect-video overflow-hidden bg-black shadow-2xl">
                        <img class="w-full h-full object-cover opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSzC-NC041V0Wsm2BB5cvNeEaGhDs0Cd9efJRXqIz8x3VzWMJluYE3rFaTAnDLIsVqbkVpZvyy5VAoqlNj-DFfI2qhodq4Ogo2TGn6aEVXgYjTqOoZkk0BBhmoL--TzUfVZ0bO7-tRUdJtY0krO22zs2611JYUzXQxzbqsfaYLULE16yShiHz-CEDPZ3HgOfmAUpjLorcQIp4kDSad32HrimBbb8EFI9YhsZdzfNI9NMpFkb9GlqVoPQz1hnr1IY2GRRt7sRZlDcYu"/>
                        <div class="absolute top-8 left-8 bg-slate-900/80 backdrop-blur-xl px-5 py-2.5 rounded-2xl text-white flex items-center gap-3 border border-white/10">
                            <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-white/50 uppercase tracking-widest leading-none">ID: CAM-00104</span>
                                <span class="text-sm font-bold leading-tight">北屯中心 • 正門大門區</span>
                            </div>
                        </div>
                    </div>

                    <!-- 下方區間選擇器 (拉動模擬) -->
                    <div class="lux-card p-10 space-y-8 bg-slate-50/50">
                        <div class="flex items-center justify-between">
                             <div class="flex items-center space-x-6">
                                <button class="material-symbols-outlined text-4xl text-slate-800">fast_rewind</button>
                                <div class="w-20 h-20 rounded-full bg-slate-900 flex items-center justify-center text-white shadow-2xl">
                                    <span class="material-symbols-outlined text-4xl">play_arrow</span>
                                </div>
                                <button class="material-symbols-outlined text-4xl text-slate-800">fast_forward</button>
                             </div>
                             <div class="text-right">
                                <p class="text-xs font-black text-slate-400 uppercase tracking-widest">目前播放時段</p>
                                <p class="text-3xl font-black text-slate-900">01:45:22</p>
                             </div>
                        </div>

                        <!-- 區間拉動模擬 (1:30 - 2:30) -->
                        <div class="relative pt-6">
                            <div class="h-6 bg-slate-200/50 rounded-full relative overflow-hidden">
                                <!-- 深色區域表示選中區間 1:30 - 2:30 -->
                                <div class="absolute h-full left-[15%] w-[45%] bg-slate-900/20 border-x-2 border-slate-900 flex items-center justify-center">
                                    <span class="text-[9px] font-black text-slate-800 uppercase tracking-tight">匯出選擇範圍 (01:30 - 02:30)</span>
                                </div>
                            </div>
                            <!-- 目前指針 -->
                            <div class="absolute -top-4 left-[35%] flex flex-col items-center">
                                <div class="w-1.5 h-16 bg-red-600 rounded-full shadow-lg"></div>
                                <div class="bg-red-600 text-white text-[9px] font-black px-2 mt-1 rounded">01:45</div>
                            </div>
                            
                            <div class="flex justify-between mt-6 text-[10px] font-black text-slate-400 tracking-widest uppercase pb-4">
                                <span>01:00</span>
                                <span class="text-slate-900">01:30</span>
                                <span>02:00</span>
                                <span class="text-slate-900">02:30</span>
                                <span>03:00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Side Info -->
                <div class="col-span-12 lg:col-span-3 space-y-8">
                    <div class="lux-card p-6 space-y-6">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest">同場地設備</h3>
                        <div class="space-y-3">
                            <div class="p-4 bg-slate-50 border-2 border-slate-900 rounded-2xl">
                                <p class="text-xs font-black text-slate-900">主碼流 - 正門對焦</p>
                                <p class="text-[10px] text-slate-500">鏡頭 ID: CAM-00104</p>
                            </div>
                            <div class="p-4 border border-slate-100 rounded-2xl hover:bg-slate-50 cursor-pointer">
                                <p class="text-xs font-black text-slate-700">廣角 - 前庭全景</p>
                                <p class="text-[10px] text-slate-500">鏡頭 ID: CAM-00105</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-900 p-8 rounded-[2rem] text-white space-y-4 shadow-2xl">
                        <span class="material-symbols-outlined text-slate-400">info</span>
                        <h4 class="text-sm font-bold">調閱須知</h4>
                        <p class="text-[10px] leading-relaxed text-slate-400">
                            歷史錄影存檔保留 30 天，如需調閱更久之前之紀錄請聯繫系統供應商進行數據恢復。
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>兒托監管雲 - 監控控制台</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="lib/config.js"></script>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-white font-body text-on-surface flex flex-col h-screen overflow-hidden">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="flex-1 overflow-y-auto p-12 w-full custom-scrollbar">
      <div class="space-y-12">
        <!-- 標題與麵包屑 -->
        <div class="border-b border-slate-100 pb-8 space-y-3">
          <div class="flex items-end gap-6">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">
              監控控制台
            </h2>
            <div class="flex items-center text-sm text-slate-400 font-bold space-x-2 mb-1.5">
              <span class="material-symbols-outlined text-[16px]">home</span>
              <span>首頁</span>
              <span class="material-symbols-outlined text-[16px]">chevron_right</span>
              <span class="text-slate-800 font-bold tracking-tight">監控控制台</span>
            </div>
          </div>
        </div>

        <div class="grid grid-cols-12 gap-12 items-start">
          <div class="col-span-12 lg:col-span-9 space-y-6">
            <div class="flex flex-col xl:flex-row xl:items-end justify-between px-2 gap-6">
              <div class="flex items-end gap-6">
                <!-- Mode Switch -->
                <div class="flex bg-slate-100 p-1 rounded-xl">
                  <button class="px-6 py-2 rounded-lg text-xs font-bold text-slate-500 hover:text-slate-900 whitespace-nowrap">
                    實時監看
                  </button>
                  <button class="px-6 py-2 rounded-lg text-xs font-bold bg-white text-[#1F2937] shadow-sm border border-black/5 whitespace-nowrap">
                    歷史回放
                  </button>
                </div>

                <!-- 雙下拉選單：左右並排 -->
                <div class="flex items-end gap-3 ml-4">
                  <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">行政區</span>
                    <select class="bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 py-2 px-4 focus:ring-2 focus:ring-slate-100 min-w-[120px]">
                      <option selected>北屯區</option>
                      <option>太平區</option>
                      <option>南區</option>
                    </select>
                  </div>
                  <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">場所名稱</span>
                    <select class="bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 py-2 px-4 focus:ring-2 focus:ring-slate-100 min-w-[160px]">
                      <option selected>北屯中心</option>
                      <option>太平中心</option>
                      <option>南區中心</option>
                    </select>
                  </div>
                </div>

                <div class="flex flex-col ml-2">
                  <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">調閱時間區段</span>
                  <div class="bg-slate-50 border border-slate-200 rounded-xl px-5 py-2 flex items-center shadow-sm">
                    <input type="date" value="2024-04-17" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 focus:ring-0" />
                    <span class="text-slate-300 font-bold px-1 mx-2">-</span>
                    <input type="time" value="08:00" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 focus:ring-0" />
                    <span class="text-slate-300 font-bold px-1 text-xs mx-1 text-slate-400">至</span>
                    <input type="time" value="12:00" class="bg-transparent border-none p-0 text-sm font-bold text-slate-800 focus:ring-0" />
                  </div>
                </div>
              </div>

              <div class="flex items-center gap-4">
                <button class="h-10 px-6 bg-slate-900 text-white rounded-xl text-xs font-bold shadow-md hover:bg-slate-800 transition-all flex items-center justify-center space-x-2">
                  <span class="material-symbols-outlined text-[18px]">search</span>
                  <span>查詢</span>
                </button>
              </div>
            </div>

            <!-- Video Player Area -->
            <div class="relative bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl group border-[12px] border-slate-50">
              <img src="assets/images/cctv1.png" class="w-full aspect-video object-cover filter brightness-90" />
              <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
              
              <div class="absolute top-10 left-10 bg-slate-900/90 backdrop-blur-2xl px-6 py-3 rounded-2xl text-white flex flex-col border border-white/10 shadow-2xl">
                <span class="text-[10px] font-bold text-accent uppercase tracking-[0.2em] mb-0.5">ID: CAM-00104</span>
                <span class="text-sm font-bold tracking-tight">北屯中心 • 正門大門區</span>
              </div>

              <!-- 控制中心：重新配置按鈕位置 -->
              <div class="absolute bottom-10 left-10 right-10 flex flex-col items-center">
                <div class="w-full h-1.5 bg-white/20 rounded-full mb-8 relative cursor-pointer group/progress">
                  <div class="absolute h-full left-[15%] w-[45%] bg-accent/30 border-x border-accent/50 flex items-center justify-center cursor-default">
                    <span class="text-[9px] font-bold text-accent uppercase tracking-widest drop-shadow-sm">選定範圍: 01:30 - 02:30</span>
                  </div>
                  <div class="absolute h-full w-[25%] bg-white rounded-full"></div>
                  <div class="absolute left-[25%] top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full shadow-2xl ring-4 ring-white/20"></div>
                </div>

                <div class="flex items-center justify-between w-full">
                  <div class="flex items-center gap-4">
                    <button class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white text-slate-900 shadow-xl hover:scale-110 active:scale-95 transition-all">
                      <span class="material-symbols-outlined text-2xl fill-1">play_arrow</span>
                    </button>
                    <div class="flex items-center space-x-2 bg-black/40 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10">
                       <span class="text-xs font-bold text-white tabular-nums font-mono">01:45:22</span>
                    </div>
                  </div>

                  <!-- 匯出按鈕放右邊，縮小並加上效果 -->
                  <button class="flex items-center px-6 h-11 bg-accent text-white rounded-xl text-xs font-bold shadow-lg shadow-blue-500/30 hover:bg-blue-600 transition-all active:scale-95">
                    <span class="material-symbols-outlined mr-2 text-lg">download</span>
                    匯出選取範圍錄影
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- Side Panel: Related Devices -->
          <div class="col-span-12 lg:col-span-3 space-y-6">
            <div class="lux-card p-8 space-y-6">
              <div class="border-b border-slate-100 pb-4">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">同場所關聯設備</h3>
                <div class="text-sm font-bold text-slate-900 flex items-center">
                  <span class="material-symbols-outlined text-[18px] mr-2 text-accent">location_on</span>
                  北屯中心
                </div>
              </div>
              
              <div class="space-y-4">
                <div class="p-5 bg-slate-50 border-2 border-slate-900 rounded-[1.5rem] shadow-sm ring-4 ring-slate-100">
                  <p class="text-[10px] font-bold text-accent tracking-widest mb-1 uppercase">ID: CAM-00104</p>
                  <p class="text-sm font-bold text-slate-900">正門大門區</p>
                </div>
                <div class="p-5 border border-slate-100 rounded-[1.5rem] hover:bg-slate-50 cursor-pointer transition-colors">
                  <p class="text-[10px] font-bold text-slate-400 tracking-widest mb-1 uppercase">ID: CAM-00105</p>
                  <p class="text-sm font-bold text-slate-700">後側遊戲場</p>
                </div>
                <div class="p-5 border border-slate-100 rounded-[1.5rem] hover:bg-slate-50 cursor-pointer transition-colors">
                  <p class="text-[10px] font-bold text-slate-400 tracking-widest mb-1 uppercase">ID: CAM-00106</p>
                  <p class="text-sm font-bold text-slate-700">公共走廊</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footer Placeholder -->
      <div id="footer-placeholder" class="mt-20"></div>
    </main>
  </body>
</html>

<!doctype html>
<html class="light" lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>實時與歷史監控 |</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="lib/config.js"></script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .timeline-gradient {
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(186, 26, 26, 0.2) 45%,
          rgba(186, 26, 26, 0.2) 55%,
          transparent 100%
        );
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #c3c6d1;
        border-radius: 10px;
      }
    </style>
    <script src="lib/layout.js"></script>
  </head>
  <body class="bg-surface font-body text-on-surface flex flex-col overflow-hidden h-screen w-screen">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar Placeholder -->
        <div id="sidebar-placeholder"></div>

        <!-- Scrollable content area -->
        <main class="flex-1 overflow-y-auto p-8 w-full space-y-8 bg-surface-container-low custom-scrollbar">
            <!-- Breadcrumbs / Page Title -->
            <div class="space-y-1">
          <div
            class="flex items-center text-xs text-slate-500 font-medium space-x-2"
          >
            <span class="material-symbols-outlined text-[12px]">home</span>
            <span>首頁</span>
            <span class="material-symbols-outlined text-[12px]"
              >chevron_right</span
            >
            <span class="text-primary font-bold">監控控制台</span>
          </div>
          <h2
            class="text-3xl font-black text-primary font-headline tracking-tight"
          >
            監控控制台
          </h2>
        </div>

        <!-- Content Container -->
        <div class="flex flex-col gap-6">
          <!-- Header Controls -->
          <section
            class="flex flex-wrap items-center justify-between gap-4 bg-white p-5 rounded-xl shadow-sm border border-outline-variant/10"
          >
            <div class="flex items-center gap-6">
              <!-- Mode Switch -->
              <div class="flex bg-surface-container-low p-1 rounded-lg">
                <button
                  class="px-4 py-1.5 rounded-md text-sm font-bold bg-white text-primary shadow-sm transition-all"
                >
                  即時模式
                </button>
                <button
                  class="px-4 py-1.5 rounded-md text-sm font-medium text-slate-500 hover:text-primary transition-colors"
                >
                  歷史回放
                </button>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <div
                class="flex items-center bg-surface-container-low px-3 py-2 rounded-lg gap-3"
              >
                <span class="material-symbols-outlined text-slate-500 text-lg"
                  >calendar_today</span
                >
                <input
                  class="bg-transparent border-none p-0 text-sm focus:ring-0 font-medium text-primary"
                  type="date"
                  value="2023-11-20"
                />
                <div class="w-px h-4 bg-outline-variant/30"></div>
                <span class="material-symbols-outlined text-slate-500 text-lg"
                  >schedule</span
                >
                <input
                  class="bg-transparent border-none p-0 text-sm focus:ring-0 font-medium text-primary"
                  type="time"
                  value="14:30"
                />
              </div>
              <button
                class="bg-primary text-white px-5 py-2 rounded-lg font-bold hover:shadow-lg transition-all flex items-center gap-2 active:scale-95"
              >
                <span class="material-symbols-outlined">search</span>
                檢索
              </button>
            </div>
          </section>

          <div class="flex gap-6 min-h-0">
            <!-- Video Monitoring Grid Area -->
            <div class="flex-1 flex flex-col gap-4">
              <!-- Video Grid (2x2) -->
              <div class="grid grid-cols-2 gap-4">
                <!-- Feed 1 -->
                <div
                  class="relative bg-black rounded-xl overflow-hidden aspect-video border-2 border-primary/20 shadow-lg group"
                >
                  <img
                    class="w-full h-full object-cover opacity-90"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSzC-NC041V0Wsm2BB5cvNeEaGhDs0Cd9efJRXqIz8x3VzWMJluYE3rFaTAnDLIsVqbkVpZvyy5VAoqlNj-DFfI2qhodq4Ogo2TGn6aEVXgYjTqOoZkk0BBhmoL--TzUfVZ0bO7-tRUdJtY0krO22zs2611JYUzXQxzbqsfaYLULE16yShiHz-CEDPZ3HgOfmAUpjLorcQIp4kDSad32HrimBbb8EFI9YhsZdzfNI9NMpFkb9GlqVoPQz1hnr1IY2GRRt7sRZlDcYu"
                  />
                  <div
                    class="absolute top-4 left-4 bg-slate-900/60 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px] flex items-center gap-2"
                  >
                    <span
                      class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"
                    ></span>
                    CAM 01 - 大班教室
                  </div>
                </div>
                <!-- Feed 2 -->
                <div
                  class="relative bg-black rounded-xl overflow-hidden aspect-video border border-outline-variant/10 group"
                >
                  <img
                    class="w-full h-full object-cover opacity-80"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9Wz9N-o59Dq83v-yP4T989MvR28g5K9N3N89V5K-9vR38N9M5K9N8V3-vR9M3N8V5K-9vR3N8V5K9N8V-3vR9M3v5K9N3V5K-9vR3N8"
                  />
                  <div
                    class="absolute top-4 left-4 bg-slate-900/60 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px] flex items-center gap-2"
                  >
                    <span
                      class="w-1.5 h-1.5 rounded-full bg-emerald-500"
                    ></span>
                    CAM 02 - 主走廊
                  </div>
                </div>
                <!-- Feed 3 -->
                <div
                  class="relative bg-black rounded-xl overflow-hidden aspect-video border border-outline-variant/10 group"
                >
                  <img
                    class="w-full h-full object-cover opacity-80"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTY4xAgb7kTMNZvaBu8QbUFyCZodU6pIIug4OIJbioPXKIkCRFd2sDhdATm1z7qTGsPaCaFhg1r15UFCAlgFFu94hI8ZA9FYgtiNGuT0iskoHXFaf1IBQYB-L_nV6_NW7g2dW8uBjENF9gXjEoDoxhRS98lI3Qnb68tPfXm2f0mRN9FTO-n11LGFEXChLBj0yhIbhpUfo3HFoZkCBNAA4jJJCxZub32BU6ma_crqmGImyoxm2gqYH8VVz7XxXbFiP15gzFkw_cyOpd"
                  />
                  <div
                    class="absolute top-4 left-4 bg-slate-900/60 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px] flex items-center gap-2"
                  >
                    <span
                      class="w-1.5 h-1.5 rounded-full bg-emerald-500"
                    ></span>
                    CAM 03 - 戶外遊戲區
                  </div>
                </div>
                <!-- Feed 4 -->
                <div
                  class="relative bg-black rounded-xl overflow-hidden aspect-video border border-outline-variant/10 group"
                >
                  <div
                    class="absolute inset-0 bg-slate-900 flex items-center justify-center"
                  >
                    <span
                      class="material-symbols-outlined text-slate-700 text-6xl"
                      >videocam_off</span
                    >
                  </div>
                  <div
                    class="absolute top-4 left-4 bg-slate-900/60 backdrop-blur-md px-3 py-1 rounded-full text-white text-[10px] flex items-center gap-2"
                  >
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>
                    CAM 04 - 未連接
                  </div>
                </div>
              </div>

              <!-- Timeline Controller -->
              <div
                class="bg-white p-5 rounded-xl shadow-sm border border-outline-variant/10 flex flex-col gap-4"
              >
                <div class="flex items-center justify-between">
                  <div
                    class="flex items-center gap-4 text-xs font-bold text-slate-400"
                  >
                    <span>10:00</span>
                    <span>11:00</span>
                    <span>12:00</span>
                    <span class="text-primary">13:00</span>
                    <span class="text-primary">14:00</span>
                    <span>15:00</span>
                    <span>16:00</span>
                  </div>
                  <div class="flex gap-2">
                    <button
                      class="w-8 h-8 rounded-lg bg-surface-container-low flex items-center justify-center text-primary"
                    >
                      <span class="material-symbols-outlined">fast_rewind</span>
                    </button>
                    <button
                      class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-white shadow-lg"
                    >
                      <span class="material-symbols-outlined">play_arrow</span>
                    </button>
                    <button
                      class="w-8 h-8 rounded-lg bg-surface-container-low flex items-center justify-center text-primary"
                    >
                      <span class="material-symbols-outlined"
                        >fast_forward</span
                      >
                    </button>
                  </div>
                </div>
                <div
                  class="h-10 bg-surface-container-low rounded-lg relative overflow-hidden"
                >
                  <div
                    class="absolute h-full w-32 bg-primary/10 border-x border-primary/20 left-1/2 -translate-x-1/2 timeline-gradient"
                  ></div>
                  <div
                    class="absolute h-full w-0.5 bg-primary left-1/2 z-10 shadow-[0_0_10px_rgba(186,26,26,0.5)]"
                  ></div>
                </div>
              </div>
            </div>

            <!-- Side Library -->
            <aside class="w-72 flex flex-col gap-4 shrink-0">
              <div
                class="bg-white rounded-xl shadow-sm border border-outline-variant/10 flex flex-col h-full overflow-hidden"
              >
                <div
                  class="p-4 border-b border-outline-variant/10 flex items-center justify-between bg-white"
                >
                  <h3 class="font-bold text-sm text-primary">設備列表</h3>
                  <span
                    class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold"
                    >3 在線</span
                  >
                </div>
                <div class="p-2 overflow-y-auto flex-1 space-y-1">
                  <div
                    class="p-3 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors border-2 border-primary/20 bg-primary/5"
                  >
                    <p class="text-[11px] font-bold text-primary">
                      CAM 01 - 大班教室
                    </p>
                    <p class="text-[9px] text-slate-500">主碼流 • 1080p</p>
                  </div>
                  <div
                    class="p-3 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors border-2 border-transparent"
                  >
                    <p class="text-[11px] font-bold text-slate-700">
                      CAM 02 - 主走廊
                    </p>
                    <p class="text-[9px] text-slate-500">子碼流 • 720p</p>
                  </div>
                  <div
                    class="p-3 hover:bg-slate-50 rounded-lg cursor-pointer transition-colors border-2 border-transparent"
                  >
                    <p class="text-[11px] font-bold text-slate-700">
                      CAM 03 - 戶外遊戲區
                    </p>
                    <p class="text-[9px] text-slate-500">主碼流 • 1080p</p>
                  </div>
                </div>
              </div>
            </aside>
          </div>
        </div>

            <!-- Footer Placeholder -->
            <div id="footer-placeholder"></div>
        </main>
    </div>
</body>
</html>
